$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "ordo.template.contract.v1"
title: "Ordo Generic Template Contract"
type: object
required:
  - template_id
  - version
  - render_mode
  - input_schema
  - output_contract
  - review_profile
  - compatibility
properties:
  template_id:
    type: string
    pattern: "^[a-z0-9_]+(\\.[a-z0-9_]+)+$"
  version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  render_mode:
    enum: [deterministic, model_rendered, hybrid]
  input_schema:
    type: object
  output_contract:
    type: object
  review_profile:
    oneOf:
      - enum: [none, standard, strict, custom]
      - type: object
  compatibility:
    type: object
  model_contract:
    type: object
additionalProperties: true
