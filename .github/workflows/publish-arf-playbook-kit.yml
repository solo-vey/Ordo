name: Publish ARF Playbook Kit

on:
  push:
    tags:
      - 'arf-playbook-kit-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing ARF Playbook Kit tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate source and build deterministic assets
        shell: bash
        run: |
          set -euo pipefail
          archive="$(python -c 'from pathlib import Path; print("ORDO_ARF_PLAYBOOK_KIT_" + Path("packages/arf_playbook_kit/VERSION").read_text().strip() + ".zip")')"
          mkdir -p dist/first dist/second
          python tools/build_arf_playbook_kit.py --out "dist/first/$archive" --manifest dist/first/manifest.json
          python tools/build_arf_playbook_kit.py --out "dist/second/$archive" --manifest dist/second/manifest.json
          cmp "dist/first/$archive" "dist/second/$archive"
          cmp dist/first/manifest.json dist/second/manifest.json
          python -m pip install pytest
          python -m pytest -q cli/tests/test_arf_playbook_kit_contract.py
          mv "dist/first/$archive" "dist/$archive"
          manifest="ORDO_ARF_PLAYBOOK_KIT_$(cat packages/arf_playbook_kit/VERSION).manifest.json"
          mv dist/first/manifest.json "dist/$manifest"
          rm -rf dist/first dist/second
          (cd dist && sha256sum "$archive" > "$archive.sha256")

      - name: Publish immutable GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          archive="$(python -c 'from pathlib import Path; print("ORDO_ARF_PLAYBOOK_KIT_" + Path("packages/arf_playbook_kit/VERSION").read_text().strip() + ".zip")')"
          version="$(cat packages/arf_playbook_kit/VERSION)"
          test "$RELEASE_TAG" = "arf-playbook-kit-v$version"
          notes="Download the ready-to-use ARF Playbook Kit, upload it to a new language-model chat, and paste START_PROMPT.md. No repository clone, Python installation, or local build is required."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "dist/$archive" "dist/$archive.sha256" "dist/ORDO_ARF_PLAYBOOK_KIT_$version.manifest.json" --clobber
          else
            gh release create "$RELEASE_TAG" "dist/$archive" "dist/$archive.sha256" "dist/ORDO_ARF_PLAYBOOK_KIT_$version.manifest.json" --title "ARF Playbook Kit $version" --notes "$notes"
          fi
