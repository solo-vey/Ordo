name: Ordo clean gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  clean-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ordo CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./cli

      - name: Run pull-request clean gate
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/ci
          ordo repo-check . \
            --clean \
            --profile standard \
            --hygiene-scope development \
            --json \
            --out reports/ci/repo_clean_check.json \
            | tee reports/ci/repo_clean_check.stdout.json

      - name: Run main-branch clean gate
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/ci
          ordo repo-check . \
            --clean \
            --profile standard \
            --hygiene-scope development \
            --fail-on-warning \
            --json \
            --out reports/ci/repo_clean_check.json \
            | tee reports/ci/repo_clean_check.stdout.json

      - name: Upload clean-gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ordo-clean-gate-${{ github.run_id }}
          path: |
            reports/ci/repo_clean_check.json
            reports/ci/repo_clean_check.stdout.json
          if-no-files-found: warn
          retention-days: 14
