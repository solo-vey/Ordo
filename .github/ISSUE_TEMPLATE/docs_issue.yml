name: Documentation issue
description: Report missing, incorrect, conflicting, or unclear current documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I checked the canonical documentation map in docs/README.md.
          required: true
        - label: I am reporting current documentation, not an archived transfer artifact.
          required: true
        - label: I removed sensitive information.
          required: true
  - type: input
    id: location
    attributes:
      label: Document or section
      description: Provide a repository path and heading when possible.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
