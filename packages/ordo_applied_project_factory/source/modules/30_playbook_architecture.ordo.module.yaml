- id: N_SHARED_TAIL_MINIMAL_VALIDATION
  description: 'Shared tail step 2: minimal technical validation after YAML generation. Failed validation shows a short issue
    list and routes to correction or blocked defer, not a separate show-details branch.'
  question: 'Запустити minimal validation: YAML parse, Ordo lint, Ordo compile, structural next-reference check, and basic
    orphan/dead-end check.'
  answer_type: enum
  allowed_answers:
  - minimal_validation_passed
  - minimal_validation_failed_start_correction
  - minimal_validation_failed_defer_fix
  answer_options:
    minimal_validation_passed: Minimal validation passed
    minimal_validation_failed_start_correction: Minimal validation failed → перейти до виправлення
    minimal_validation_failed_defer_fix: Minimal validation failed → відкласти виправлення, handoff blocked
  user_facing_contract:
    show_short_issue_list_on_failure: true
    details_are_inside_correction_mode: true
    do_not_offer_separate_show_details_branch: true
    handoff_blocked_if_failed: true
  on_answer:
    minimal_validation_passed:
      label: minimal validation passed
      update_state:
        minimal_validation_status: passed
      next: N_SHARED_TAIL_FULL_VALIDATION_DECISION
    minimal_validation_failed_start_correction:
      label: minimal validation failed; correction mode
      update_state:
        minimal_validation_status: failed
        validation_issues: $answer.issues
        validation_fix_status: correction_loop_started
      next: N_SHARED_TAIL_CORRECTION_LOOP
    minimal_validation_failed_defer_fix:
      label: minimal validation failed; fix deferred and handoff blocked
      update_state:
        minimal_validation_status: failed
        validation_issues: $answer.issues
        validation_fix_status: deferred
        handoff_blocked: true
      next: STOP_VALIDATION_FIX_DEFERRED_HANDOFF_BLOCKED
