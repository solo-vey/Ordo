- id: N_MODULE_VERSIONING_POLICY
  question: 'Підтвердьте versioning policy: Project Factory має власну версійність модуля, а мовний пакет лише включає конкретну
    версію цього модуля.'
  answer_type: enum
  allowed_answers:
  - module_local_versioning
  - adjust_policy
  on_answer:
    module_local_versioning:
      label: власна версійність модуля
      update_state:
        module_versioning_policy:
          module_id: ordo.applied_project_factory
          module_version: 0.1.0-alpha.17
          language_package_version: 0.12.0-preview-rc1
          numbering_rule: module_version_is_independent_from_language_package_milestones
          inclusion_rule: language_package_includes_explicit_module_version
          historical_mapping:
            M61.1: 0.1.0-alpha.1
            M61.2: 0.1.0-alpha.2
            M61.3: 0.1.0-alpha.3
            M61.4: 0.1.0-alpha.4
            M61.5: 0.1.0-alpha.5
            M61.6: 0.1.0-alpha.6
            current: 0.1.0-alpha.17
            0.1.0-alpha.8: user_facing_runtime_review
            0.1.0-alpha.10: incremental_validation_gate
            0.1.0-alpha.12: control_action_bookkeeping
            0.1.0-alpha.15: branch_1_progressive_authoring
            0.1.0-alpha.16: branch_3_free_dialogue_consistency_delta
            0.1.0-alpha.17: branch_2_manual_tree_entry_adapter
        module_versioning_policy_status: confirmed
        language_package_inclusion_model: language_package_includes_module_at_explicit_module_version
        parent_language_package_version: 0.12.0-preview-rc1
      next: N_GRAPH_ANNOTATION_OVERLAY_POLICY
    adjust_policy:
      label: уточнити versioning policy
      update_state:
        module_versioning_policy: $answer
        module_versioning_policy_status: custom_confirmed
      next: N_GRAPH_ANNOTATION_OVERLAY_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_module_version_vs_language_package_version
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: module versioning policy remains unclear
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Retained as historical design note; module version is represented in module.version and package metadata.
  description: 'Alpha.20 integration note: deprecated legacy compatibility node; not counted as unresolved orphan in active
    whole-tree runtime path.'
  allowed_from:
  - N_LANGUAGE_IMPROVEMENT_PROPOSALS_REVIEW
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_GRAPH_ANNOTATION_OVERLAY_POLICY
  question: Коли потрібно, використовуємо graph generator v1.1 annotation overlay для підсвічування вузлів/гейтів і коротких
    коментарів у SVG. Підтвердити?
  answer_type: enum
  allowed_answers:
  - use_v1_1_preview_when_helpful
  - context_only_without_annotations
  on_answer:
    use_v1_1_preview_when_helpful:
      label: використовувати annotations за потреби
      update_state:
        graph_annotation_overlay_policy:
          tool: ordo_visual_graph_generator
          version: 1.1.0-preview
          schema: ordo.graph.annotations.v1
          use_for:
          - highlight_current_node
          - mark_changed_nodes
          - comment_gate_or_state_review_points
          default_rendering_remains: focused_context_svg
          preview_limit: annotation demo renderer is optional review aid, not validation source of truth
        graph_annotation_overlay_status: confirmed
        graph_annotation_overlay_tool_version: ordo_visual_graph_generator 1.1.0-preview
      next: N_DECISION_TREE_BLUEPRINT
    context_only_without_annotations:
      label: поки тільки context SVG
      update_state:
        graph_annotation_overlay_policy:
          enabled: false
          reason: $answer
        graph_annotation_overlay_status: deferred
      next: N_DECISION_TREE_BLUEPRINT
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_annotations_as_optional_svg_review_layer
    max_attempts: 2
    on_exhausted:
      action: continue_with_context_svg_only
      reason: annotation overlay policy remains unclear
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Retained as historical graph policy note; graph generation is requested explicitly outside runtime path.
  description: 'Alpha.20 integration note: deprecated legacy compatibility node; not counted as unresolved orphan in active
    whole-tree runtime path.'
  allowed_from:
  - N_MODULE_VERSIONING_POLICY
