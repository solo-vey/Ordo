- id: N_MINIMAL_VALIDATION_AFTER_SCOPED_PATCH
  description: Після мінімальної перевірки scoped patch joins the shared validation/handoff tail. Full validation/handoff
    nodes are referenced, not duplicated.
  question: 'Запустити мінімальну перевірку після patch: YAML parse, Ordo lint, compile/refresh IR.'
  answer_type: enum
  allowed_answers:
  - minimal_validation_passed
  - minimal_validation_failed
  answer_options:
    minimal_validation_passed: мінімальна перевірка пройдена
    minimal_validation_failed: мінімальна перевірка знайшла проблему
  on_answer:
    minimal_validation_passed:
      label: minimal validation passed; join shared full validation pipeline
      update_state:
        existing_process_minimal_validation_status: passed
        existing_process_shared_pipeline_join_status: joined_shared_full_validation_pipeline
        full_project_validation_status: pending
      next: N_SHARED_TAIL_FULL_VALIDATION_DECISION
    minimal_validation_failed:
      label: minimal validation failed; return to scoped correction
      update_state:
        existing_process_minimal_validation_status: failed
        incremental_yaml_validation_status: failed
      next: N_SCOPED_YAML_PATCH_APPLICATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_missing_existing_process_improvement_detail
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: N_MINIMAL_VALIDATION_AFTER_SCOPED_PATCH remains unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-MINIMAL-PATCH-VALIDATION
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: evidence_state
    source_id: N_MINIMAL_VALIDATION_AFTER_SCOPED_PATCH
    input:
      state_projection:
      - incremental_yaml_validation_status
      - syntax_checked
      - semantic_ir_compiled
      - validation_findings_requiring_tree_correction
      - unfinished_output_templates
      - artifacts.implementation_prompt
      - artifacts.source_code
      - artifacts.repository_patch
      - artifacts.tests
      - artifacts.implementation_artifacts
      - claims.implementation_complete
      - package.structure_valid
      - package.missing_mandatory_artifacts
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PROMPT_AS_IMPLEMENTATION
    - PACKAGE_VALIDATION_WITHOUT_COMPLETENESS_VALIDATION
  allowed_from:
  - N_SCOPED_YAML_PATCH_APPLICATION
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
