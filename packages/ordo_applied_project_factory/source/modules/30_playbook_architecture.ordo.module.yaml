  description: 'Shared tail step 5: scoped correction loop for validation issues. It shows what is broken, proposes minimal
    scoped fixes, and distinguishes technical fixes from process-logic changes.'
  question: Validation issues require correction. Review the short issue list and a scoped correction plan. Apply scoped corrections,
    request/manual revision, or defer correction.
  answer_type: enum
  allowed_answers:
  - apply_scoped_corrections
  - manual_revision_requested
  - defer_correction
  answer_options:
    apply_scoped_corrections: Застосувати scoped corrections
    manual_revision_requested: Виправити вручну / уточнити
    defer_correction: Відкласти correction
  user_facing_contract:
    show_what_is_broken: true
    show_minimal_scoped_fix: true
    label_if_process_logic_changes: true
    do_not_apply_large_unexplained_patch: true
  on_answer:
    apply_scoped_corrections:
      label: scoped corrections applied
      update_state:
        correction_loop:
          user_decision: apply_scoped_corrections
          correction_status: applied
          proposed_corrections: $answer.corrections
          correction_scope: $answer.scope
      next: N_SHARED_TAIL_MINIMAL_VALIDATION
    manual_revision_requested:
      label: manual revision requested
      update_state:
        correction_loop:
          user_decision: manual_revision_requested
          correction_status: pending
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    defer_correction:
      label: correction deferred
      update_state:
        correction_loop:
          user_decision: deferred
          correction_status: deferred
        handoff_blocked: true
      next: STOP_VALIDATION_FIX_DEFERRED_HANDOFF_BLOCKED
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_apply_manual_or_defer_correction
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: correction decision unclear
  allowed_from:
  - N_SHARED_TAIL_FINAL_HANDOFF
  - N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
  - N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
  - N_SHARED_TAIL_MINIMAL_VALIDATION
  - N_SHARED_TAIL_VALIDATION_RESULT_REVIEW
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
  description: 'Shared tail step 6: final unfinished-items/readiness gate before handoff package generation.'
  question: 'Final readiness check: unfinished artifacts/templates, deferred outputs, validation limitations, accepted alpha
    limitations, removed artifacts, and blocking items.'
  answer_type: enum
  allowed_answers:
  - ready_for_handoff
  - resolve_blockers
  - remove_blocking_artifacts
  - defer_handoff
  answer_options:
    ready_for_handoff: Blocking items немає → перейти до handoff package generation
    resolve_blockers: Доробити blockers
    remove_blocking_artifacts: Видалити blocking artifacts
    defer_handoff: Відкласти handoff
  user_facing_contract:
    show_final_readiness_card: true
    show_alpha_limitations_separately: true
    if_blocked_keep_options_simple:
    - resolve_blockers
    - remove_blocking_artifacts
    - defer_handoff
    do_not_use_removed_artifacts: true
    do_not_use_unfinished_active_artifacts: true
  on_answer:
    ready_for_handoff:
      label: ready for handoff
      update_state:
        final_readiness_status: ready_for_handoff
      next: N_SHARED_TAIL_DELIVERY_TARGET_DECISION
    resolve_blockers:
      label: blockers need correction
      update_state:
        final_readiness_status: blocked
        open_correction_items: $append:$answer.blockers
      next: N_SHARED_TAIL_CORRECTION_LOOP
    remove_blocking_artifacts:
      label: blocking artifacts removed
      update_state:
        removed_output_artifacts: $append:$answer.artifacts
      next: N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
    defer_handoff:
      label: handoff deferred
      update_state:
        final_readiness_status: deferred
      next: STOP_HANDOFF_DEFERRED
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_ready_resolve_remove_or_defer_handoff
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: final readiness decision unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-SHARED-TAIL-UNFINISHED-BRANCHES
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: runtime_state
    source_id: N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
    input:
      state_projection:
      - unfinished_output_templates
      - open_questions
      - deferred_return_points
      - unreviewed_sibling_branches
      - terminal_path_ready_records
      - process.required_stages
      - process.completed_stages
      - process.stage_order
      - process.current_stage
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_SHARED_TAIL_CORRECTION_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - MANDATORY_BRANCH_SHORT_CIRCUIT
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-SHARED-TAIL-UNFINISHED-COMPLETENESS
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: evidence_state
    source_id: N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
    input:
      state_projection:
      - unfinished_output_templates
      - open_questions
      - terminal_path_ready_records
      - full_project_validation_status
      - validation_findings_requiring_tree_correction
      - package.structure_valid
      - package.missing_mandatory_artifacts
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_SHARED_TAIL_CORRECTION_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PACKAGE_VALIDATION_WITHOUT_COMPLETENESS_VALIDATION
  allowed_from:
  - N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
  - N_SHARED_TAIL_FULL_VALIDATION_DECISION
  - N_SHARED_TAIL_VALIDATION_RESULT_REVIEW
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_SHARED_TAIL_DELIVERY_TARGET_DECISION
  description: 'Shared tail delivery decision: after the canonical playbook contract and validation are stable, ARF recommends
    a delivery target and the analyst confirms engine runtime, prompt-only instructions, or both.'
  question: 'The canonical playbook is validated. Review the ARF recommendation and choose the delivery target: engine_runtime,
    prompt_only, or both. Prompt-only does not retain mechanical gates, runtime state validation, enforced transitions, CSG
    protection, or default runtime evidence capture.'
  answer_type: enum
  allowed_answers:
  - engine_runtime
  - prompt_only
  - both
  answer_options:
    engine_runtime: Full controlled ARF runtime package
    prompt_only: Lightweight model-instruction package
    both: Both packages from the same canonical Ordo source
  preconditions:
  - canonical_playbook_contract_stable
  - full_project_validation_status_ready
  recommendation_contract:
    assessment_inputs:
    - risk_level
    - branch_count
    - gate_count
    - backtrack_point_count
    - mechanical_enforcement_required
    - regulated_or_high_consequence
    - prompt_evidence
    safe_default: engine_runtime
    analyst_confirmation_required: true
    prompt_only_requires_sufficient_evidence: true
  user_facing_contract:
    show_recommended_target: true
    show_recommendation_reasons: true
    show_prompt_only_guarantees_lost: true
    do_not_ask_before_contract_stabilization: true
    allow_both: true
  on_answer:
    engine_runtime:
      label: full controlled runtime
      update_state:
        delivery_target: engine_runtime
        delivery_target_decision_status: confirmed
        engine_runtime_package_required: true
        prompt_only_package_required: false
      next: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
    prompt_only:
      label: lightweight model instructions
      update_state:
        delivery_target: prompt_only
        delivery_target_decision_status: confirmed_subject_to_evidence_gate
        engine_runtime_package_required: false
        prompt_only_package_required: true
        prompt_only_guarantee_loss_acknowledged: true
      next: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
    both:
      label: both delivery targets
      update_state:
        delivery_target: both
        delivery_target_decision_status: confirmed
        engine_runtime_package_required: true
        prompt_only_package_required: true
        prompt_only_guarantee_loss_acknowledged: true
      next: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_three_delivery_targets_and_show_safe_default
    max_attempts: 2
    on_exhausted:
      action: default_to_safe_target
      target: engine_runtime
      reason: delivery target remains unclear
  allowed_from:
  - N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
  description: 'Shared tail step 7: generate a file-first handoff package after final readiness is ready_for_handoff.'
  question: 'Процес готовий до handoff. Згенерувати handoff package: source YAML, compiled artifacts, validation report, output/template
    catalog, terminal binding summary, alpha limitations, unfinished/removed items log, changelog/release notes, usage/start
    prompt notes.'
  answer_type: enum
  allowed_answers:
  - handoff_package_generated
  - handoff_package_failed
  answer_options:
    handoff_package_generated: Handoff package generated
    handoff_package_failed: Handoff package generation failed
  user_facing_contract:
    file_first_handoff_package: true
    show_package_summary_card: true
    include_download_link: true
    show_alpha_limitations: true
    do_not_generate_if_final_readiness_not_ready: true
  on_answer:
    handoff_package_generated:
      label: handoff package ready
      update_state:
        handoff_package_status: ready
        handoff_package:
          package_status: generated
          package_files: $answer.files
          package_summary: $answer.summary
      next: N_SHARED_TAIL_FINAL_HANDOFF
    handoff_package_failed:
      label: handoff package failed
      update_state:
        handoff_package_status: failed
        open_correction_items: $append:$answer.issue
      next: N_SHARED_TAIL_CORRECTION_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_handoff_package_generated_or_failed
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: handoff package status unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-HANDOFF-PACKAGE-GENERATION
    phase: before_package_finalization
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: package_state
    source_id: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
    input:
      state_projection:
      - process_package_status
      - full_project_validation_status
      - unfinished_output_templates
      - terminal_path_ready_records
      - artifact_review_mode_policy
      - artifacts.implementation_prompt
      - artifacts.source_code
      - artifacts.repository_patch
      - artifacts.tests
      - artifacts.implementation_artifacts
      - claims.implementation_complete
      - package.structure_valid
      - package.missing_mandatory_artifacts
      - package.final_label
      - evidence.supports_final_label
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_SHARED_TAIL_CORRECTION_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PROMPT_AS_IMPLEMENTATION
    - PACKAGE_VALIDATION_WITHOUT_COMPLETENESS_VALIDATION
    - FINAL_LABEL_OVERCLAIM
  allowed_from:
  - N_SHARED_TAIL_DELIVERY_TARGET_DECISION
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_SHARED_TAIL_FINAL_HANDOFF
  description: 'Shared tail step 8: final handoff decision after package generation. User either accepts the package or returns
    it for revision.'
  question: Handoff package готовий. Прийняти package або повернутись до правок?
  answer_type: enum
  allowed_answers:
  - accept_handoff_package
  - return_to_revision
  answer_options:
    accept_handoff_package: Прийняти handoff package
    return_to_revision: Повернутись до правок
  user_facing_contract:
    show_final_handoff_summary: true
    show_package_link: true
    show_validation_status_without_overclaiming: true
    show_alpha_limitations_if_any: true
    only_two_actions:
    - accept_handoff_package
    - return_to_revision
  on_answer:
    accept_handoff_package:
      label: handoff accepted
      update_state:
        handoff_status: accepted
        process_package_status: ready_for_use_or_next_review
      next: END_HANDOFF_ACCEPTED
    return_to_revision:
