- id: N_APPROVAL_TO_GENERATE_SOURCE_YAML
  question: 'Перед генерацією source/program.ordo.yaml підтвердіть pre-generation summary: goal, process type, roles, entry
    point, approved tree, state, gates, terminal outputs, template/mock status і deferred items.'
  answer_type: enum
  allowed_answers:
  - 'yes'
  - 'no'
  on_answer:
    'yes':
      update_state:
        approval_to_generate_source_yaml: true
        source_yaml_generation_approval: approved
        source_yaml_generation_scope:
        - approved_decision_tree
        - state_schema
        - gates
        - shared_output_template_subflow
        - terminal_output_bindings
        - unfinished_items_policy
      next: N_SHARED_TAIL_SOURCE_YAML_GENERATION
    'no':
      next: STOP_NEEDS_APPROVAL
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: rephrase_source_yaml_generation_approval
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: source yaml approval remains unclear
  description: Окремий approval gate перед генерацією source/program.ordo.yaml; PM не пише YAML сам, але підтверджує, що структура
