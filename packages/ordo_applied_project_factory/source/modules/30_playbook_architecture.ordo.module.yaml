- id: N_OUTPUT_ARTIFACT_CATALOG
  question: Які результати може створювати процес? Зафіксуйте known, candidate, optional, deferred або no-document outputs;
    AI може запропонувати перелік, якщо користувач не знає його наперед.
  answer_type: structured_list
  on_answer:
    update_state:
      output_artifact_catalog_status: $answer.status
      output_artifact_catalog: $answer.known_outputs
      candidate_output_artifact_catalog: $answer.candidate_outputs
      optional_output_artifacts: $answer.optional_outputs
      deferred_output_artifacts: $answer.deferred_outputs
      no_document_outputs_flag: $answer.no_document_outputs
      ai_should_propose_outputs: $answer.ai_should_propose_outputs
    next: N_TERMINAL_OUTPUT_BINDING_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_output_policy_known_partial_ai_proposed_deferred_or_none
    max_attempts: 2
    on_exhausted:
      action: continue_with_candidate_outputs_to_be_proposed
      reason: output catalog can start as candidate/deferred
  description: Output artifact catalog is separate from input sources and separate from templates. It records possible results
