- id: N_RUNTIME_ROLES
  question: Хто буде користувачем runtime-процесу і яку роль має виконувати AI у цьому прикладному проєкті?
  answer_type: free_text
  on_answer:
    update_state:
      runtime_human_role: $answer.human_role
      runtime_ai_role: $answer.ai_role
    next: N_DOMAIN_MODEL_OVERVIEW
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_human_and_ai_roles_separately
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: runtime roles remain unclear
  description: Після мети і типу процесу AI зʼясовує runtime-користувача та роль AI; runtime entry point визначається пізніше,
    після доменної моделі, input/output policy та open questions.
  allowed_from:
  - N_APPLIED_PROCESS_TYPE
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_RUNTIME_ENTRY_POINT
  question: Після доменної моделі, input/output policy і open questions визначте, з чого має починатися runtime-сесія користувача.
  answer_type: free_text
  on_answer:
    update_state:
      runtime_entry_point: $answer
    next: N_PROGRESSIVE_TREE_AUTHORING_ENTRY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_first_user_message_or_first_input
