  description: 'Цей вузол фіксує економний режим зміни YAML під час обходу дерева: після підтвердженого кроку вносимо тільки
    малий scoped patch, якщо він потрібен, і запускаємо мінімальну перевірку. Повна перевірка не виконується після кожного
    вузла.'
  question: 'Підтвердіть режим роботи під час обходу дерева: після кожного підтвердженого кроку, якщо YAML треба змінити,
    робимо малий YAML patch і мінімальну перевірку; повний CLI validation запускаємо тільки на terminal/pre-handoff gate або
    якщо мінімальна перевірка знаходить проблему.'
  answer_type: enum
  allowed_answers:
  - confirm_incremental_yaml_patch_policy
  - adjust_incremental_yaml_patch_policy
  answer_options:
    confirm_incremental_yaml_patch_policy: підтвердити incremental YAML patch + minimal check
    adjust_incremental_yaml_patch_policy: уточнити validation profile
  on_answer:
    confirm_incremental_yaml_patch_policy:
      label: incremental YAML patch policy confirmed
      update_state:
        incremental_yaml_update_policy:
          enabled: true
          when: after_each_confirmed_tree_step_if_yaml_change_is_needed
          write_mode: small_scoped_patch
          avoid_full_regeneration_on_each_node: true
        incremental_yaml_validation_profile:
          name: minimal_yaml_patch_check
          checks:
          - yaml_parse
          - cli_lint
          - cli_compile_refresh_ir
          full_validation_deferred_until:
          - terminal_branch
          - before_project_generation_or_handoff
        incremental_yaml_validation_status: confirmed_profile
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    adjust_incremental_yaml_patch_policy:
      label: custom incremental validation policy
      update_state:
        incremental_yaml_update_policy: $answer.policy
        incremental_yaml_validation_profile: $answer.validation_profile
        incremental_yaml_validation_status: custom_confirmed
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_minimal_patch_vs_full_validation_cadence
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: incremental YAML validation policy unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-INCREMENTAL-YAML-PATCH-AUTHORIZATION
    phase: before_repository_mutation
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: repository_state
    source_id: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
    input:
      state_projection:
      - pending_process_change
      - last_incremental_yaml_patch_summary
      - scope_confirmation_status
      - implementation_authorization_status
      - conversation.scope_confirmed
      - repository.mutation_started
      - authorization.repository_mutation
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - SCOPE_CONFIRMATION_AS_IMPLEMENTATION_AUTHORIZATION
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-INCREMENTAL-YAML-PATCH-IMPLEMENTATION-EVIDENCE
    phase: before_repository_mutation
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: process_trace
    source_id: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
    input:
      state_projection:
      - pending_process_change
      - last_incremental_yaml_patch_summary
      - source_yaml_created
      - semantic_ir_compiled
      - incremental_yaml_validation_status
      - artifacts.implementation_prompt
      - artifacts.source_code
      - artifacts.repository_patch
      - artifacts.tests
      - artifacts.implementation_artifacts
      - claims.implementation_complete
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PROMPT_AS_IMPLEMENTATION
  allowed_from:
  - N_PROCESS_FEEDBACK_CHANGE_CONFIRMATION
  - N_TREE_NODE_REVIEW_DISPLAY_CONTRACT
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_TREE_DEPTH_FIRST_REVIEW_LOOP
  question: 'Покажіть рівно один поточний вузол дерева для review у process-design rendering форматі: спочатку явно назвіть
    runtime mode/context shift (tree traversal, branch selection, node-review decision або execution gate), потім покажіть
    людський опис, питання/дію, варіанти переходів або control-дії, що запамʼятовується в state, які gates перевіряються,
    які artifacts/outputs/templates повʼязані, які open questions або sibling-гілки лишаються. Після показу вузла НЕ питати
    generic “підтверджуєш?”; перейти до control gate, де користувач обирає одну з дій: підтвердити, виправити або відкласти.
    Також покажіть control-action bookkeeping: selected_control_action, not_selected_control_actions і blocked_until_ready_actions
    окремо від unreviewed_sibling_branches/deferred_return_points.'
  answer_type: structured_list
  on_answer:
    update_state:
      current_tree_review_node: $answer.node
      approved_decision_tree: $answer.tree_snapshot
      tree_review_depth_first_complete: $answer.depth_first_complete
      draft_tree_review_status: in_review
      self_hosted_authoring_loop_status: node_review_in_progress
      confirmed_review_path: $answer.confirmed_path
      current_review_branch: $answer.current_branch
      unreviewed_sibling_branches: $answer.unreviewed_sibling_branches
      deferred_return_points: $answer.deferred_return_points
      current_node_review_record: $answer.current_node_review_record
      node_review_ordo_layer_visibility: short_always_detailed_on_request
      selected_control_action: $answer.selected_control_action
      not_selected_control_actions: $answer.not_selected_control_actions
      blocked_until_ready_actions: $answer.blocked_until_ready_actions
      current_process_layer_label: $answer.current_process_layer_label
      runtime_context_shift_notice: $answer.runtime_context_shift_notice
      current_node_display_block: $answer.current_node_display_block
    next: N_CURRENT_NODE_REVIEW_DECISION_GATE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_or_correct_current_node
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: current tree node review incomplete
  description: 'Поточний вузол review показується користувачу в user-facing process-design rendering форматі з явним mode
    label/context shift: tree traversal, branch selection, node-review decision або execution/validation gate. Runtime view
    must show state, gates, artifacts, pending sibling/deferred branches, and must not mix real unreviewed sibling branches
    with not-selected control actions.'
  allowed_from:
  - N_CURRENT_NODE_REVIEW_DECISION_GATE
  - N_DRAFT_SUBTREE_REVIEW_START
  - N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  - N_SHARED_TAIL_CORRECTION_LOOP
  - N_SHARED_TAIL_SOURCE_YAML_GENERATION
  - N_SUBTREE_REVIEW_COMPLETION_CHECK
  - N_TREE_REVIEW_CONTINUE_OR_APPROVE
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_CURRENT_NODE_REVIEW_DECISION_GATE
  description: 'Control/review gate для поточного вузла. Це не змістовий вузол дерева, який треба “підтвердити як частину
    дерева”, а runtime-рішення користувача щодо вже показаного вузла. Before asking, runtime must explicitly say: “Зараз це
    review-рішення по показаному вузлу, не вибір гілки дерева.” Після вибору action runtime фіксує selected_control_action
    і not_selected_control_actions; ці not-selected actions не додаються до deferred return points.'
  question: Що робимо з поточним показаним вузлом?
  answer_type: enum
  allowed_answers:
  - approve_current_node
  - correct_current_node
  - defer_current_node
  answer_options:
    approve_current_node: Підтвердити поточний вузол як є
    correct_current_node: Виправити поточний вузол і показати оновлену версію
    defer_current_node: Відкласти поточний вузол / винести в open questions або deferred return points
  on_answer:
    approve_current_node:
      label: вузол підтверджено
      update_state:
        current_node_review_decision: approved
        current_node_review_record.status: approved
        node_review_control_gate_status: passed
        confirmed_review_path: $answer.confirmed_path
        last_incremental_yaml_patch_summary: node approved; yaml patch only if current node definition changed
        selected_control_action: approve_current_node
        not_selected_control_actions:
        - correct_current_node
        - defer_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=approve_current_node;not_selected=correct_current_node,defer_current_node
        runtime_context_shift_notice: node_review_decision_completed_return_to_tree_traversal
      next: N_BRANCH_REVIEW
    correct_current_node:
      label: вузол потребує правки
      update_state:
        current_node_review_decision: needs_correction
        current_node_review_record.status: needs_correction
        corrected_review_nodes: $answer.corrections
        draft_tree_review_status: node_correction_in_progress
        node_review_control_gate_status: correction_requested
        last_incremental_yaml_patch_summary: correction requested; apply scoped YAML patch after corrected node is accepted
        selected_control_action: correct_current_node
        not_selected_control_actions:
        - approve_current_node
        - defer_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=correct_current_node;not_selected=approve_current_node,defer_current_node
        runtime_context_shift_notice: node_review_decision_requests_correction
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    defer_current_node:
      label: вузол відкладено
      update_state:
        current_node_review_decision: deferred
        current_node_review_record.status: deferred
        deferred_review_nodes: $answer.deferred_nodes
        deferred_return_points: $answer.deferred_return_points
        open_questions: $answer.open_questions
        node_review_control_gate_status: deferred
        last_incremental_yaml_patch_summary: node deferred; update deferred return points/open questions only
        selected_control_action: defer_current_node
        not_selected_control_actions:
        - approve_current_node
        - correct_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=defer_current_node;not_selected=approve_current_node,correct_current_node
        runtime_context_shift_notice: node_review_decision_deferred_return_point_recorded
      next: N_SUBTREE_REVIEW_COMPLETION_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_three_node_decision_options_approve_correct_defer
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: current node review decision unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-CURRENT-NODE-REVIEW-DECISION
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: runtime_state
    source_id: N_CURRENT_NODE_REVIEW_DECISION_GATE
    input:
      state_projection:
      - current_node_review_record
      - current_node_review_decision
      - unreviewed_sibling_branches
      - deferred_return_points
      - blocked_until_ready_actions
      - selected_control_action
      - process.required_stages
      - process.completed_stages
      - process.stage_order
      - process.current_stage
      - node.decisions
      - node.responsibilities
      - node.execution_started
      - node.route_explicit
      - node.authorization_explicit
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_CURRENT_NODE_REVIEW_DECISION_GATE
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - MANDATORY_BRANCH_SHORT_CIRCUIT
    - COMPLEXITY_ROUTING_AND_EXECUTION_IN_ONE_NODE
  allowed_from:
  - N_TREE_DEPTH_FIRST_REVIEW_LOOP
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_TREE_REVIEW_CONTINUE_OR_APPROVE
  question: Продовжити review наступної гілки/вузла чи затвердити дерево рішень?
  answer_type: enum
  allowed_answers:
  - continue_depth_first
  - approve_tree
  answer_options:
    continue_depth_first: Продовжити depth-first review
    approve_tree: Затвердити дерево
  on_answer:
    continue_depth_first:
      label: наступний вузол
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      update_state:
        selected_control_action: continue_depth_first
        not_selected_control_actions:
        - approve_tree
        blocked_until_ready_actions:
        - action: approve_tree
          blocked_until: all_required_branches_reviewed
          reason: unreviewed_sibling_branches_or_deferred_return_points_may_remain
        control_action_decision_log: $append:selected=continue_depth_first;not_selected=approve_tree;blocked=approve_tree_until_all_required_branches_reviewed
        current_process_layer_label: tree_traversal
    approve_tree:
      label: дерево затверджено
      update_state:
        draft_tree_review_status: approved
        tree_review_depth_first_complete: true
        self_hosted_authoring_loop_status: decision_tree_approved
        selected_control_action: approve_tree
        not_selected_control_actions:
        - continue_depth_first
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=approve_tree;not_selected=continue_depth_first
        current_process_layer_label: tree_traversal
      next: N_STABILIZED_TREE_BRANCH_HANDOFF
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_continue_or_approve_tree
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: tree review continuation unclear
  description: 'Цей вузол вирішує, чи йдемо до наступного вузла дерева, чи все дерево вже пройдено й може бути затверджене.
    approve_tree can be blocked/deferred while unreviewed sibling branches or deferred return points remain. Runtime must
    label this as tree traversal / branch-selection level, not node-review correction. Alpha.15 note: for progressive tree
    authoring, subtree completion should use N_SUBTREE_REVIEW_COMPLETION_CHECK and N_APPROVED_TREE_CONSOLIDATION; this node
    remains for legacy/free-dialogue compatibility. Alpha.20 integration note: deprecated legacy compatibility node; not counted
    as unresolved orphan in active whole-tree runtime path.'
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Superseded by subtree review completion and approved tree consolidation.
  allowed_from: []
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
  entry_modes:
  - migration
