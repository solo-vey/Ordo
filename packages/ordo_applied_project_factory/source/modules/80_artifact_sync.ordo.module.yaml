artifact_sync:
  sync_id: ordo_applied_project_factory_artifact_sync
  profile: strict
  source_of_truth:
  - path: source/program.ordo.yaml
    role: package_source
  - path: ordo.yml
    role: package_manifest
  derived_artifacts:
  - artifact_id: reports_cli_validation_summary_md
    path: reports/CLI_VALIDATION_SUMMARY.md
    role: validation_report
    derived_from:
    - source/program.ordo.yaml
    derivation_method: declared_build_or_validation
    freshness_policy: must_exist
    stale_action: block_release
    sha256: 371dc171a073121a4ecfb8e202749ac1532717fdffbd0920db422fed0702d4c6
  - artifact_id: ordo_runtime_json
    path: ordo.runtime.json
    role: runtime_manifest
    derived_from:
    - source/program.ordo.yaml
    derivation_method: declared_build_or_validation
    freshness_policy: must_exist
    stale_action: block_release
    sha256: 511a380cb645b2dac6ab77293cbaed5d736fb79bc724f45b13d46957233d5dc5
  authority_boundary:
    derived_artifacts_may_override_source_of_truth: false
