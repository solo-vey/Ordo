nodes:
- id: N_FACTORY_MODE_SELECTION
  question: 'Оберіть режим роботи Project Factory: 1 — Доменна модель + дерево рішень;
    2 — Ручне дерево рішень; 3 — Вільний діалог; 4 — Коригування існуючого процесу;
    5 — Міграція старої монолітної інструкції.'
  answer_type: enum
  allowed_answers:
  - domain_model_plus_tree
  - manual_tree_authoring
  - free_dialogue
  - existing_process_improvement
  - legacy_instruction_migration
  answer_options:
    domain_model_plus_tree: Доменна модель + дерево рішень
    manual_tree_authoring: Ручне дерево рішень
    free_dialogue: Вільний діалог
    existing_process_improvement: Коригування існуючого процесу
    legacy_instruction_migration: Міграція старої монолітної інструкції
  on_answer:
    domain_model_plus_tree:
      label: 1. Доменна модель + дерево рішень
      update_state:
        factory_authoring_mode: domain_model_plus_tree
      next: N_APPLIED_PROJECT_GOAL
    manual_tree_authoring:
      label: 2. Ручне дерево рішень
      update_state:
        factory_authoring_mode: manual_tree_authoring
      next: N_MANUAL_TREE_PROJECT_GOAL
    free_dialogue:
      label: 3. Вільний діалог
      update_state:
        factory_authoring_mode: free_dialogue
      next: N_FREE_DIALOGUE_INTAKE
    existing_process_improvement:
      label: 4. Коригування існуючого процесу
      update_state:
        factory_authoring_mode: existing_process_improvement
        existing_process_improvement_status: started
        current_process_layer_label: tree_traversal
      next: N_EXISTING_PROCESS_IMPROVEMENT_ENTRY
    legacy_instruction_migration:
      label: 5. Міграція старої монолітної інструкції
      update_state:
        factory_authoring_mode: legacy_instruction_migration
        legacy_migration_status: started
        current_process_layer_label: migration_intake
      next: N_LEGACY_INSTRUCTION_MIGRATION_ENTRY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_five_authoring_modes_in_plain_language
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: factory authoring mode remains unclear
  description: 'Цей вузол обирає спосіб роботи Project Factory: створення з доменної
    моделі, ручне дерево, вільний діалог, коригування вже існуючого Ordo-процесу або
    міграція старої монолітної інструкції у структурований Ordo-playbook.'
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-FACTORY-MODE-SELECTION
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: conversation
    source_id: N_FACTORY_MODE_SELECTION
    input:
      state_projection:
      - factory_authoring_mode
      - runtime_context_shift_notice
      - selected_control_action
      - scope_confirmation_status
      - implementation_authorization_status
      - conversation.scope_confirmed
      - repository.mutation_started
      - authorization.repository_mutation
      - node.decisions
      - node.responsibilities
      - node.execution_started
      - node.route_explicit
      - node.authorization_explicit
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_FACTORY_MODE_SELECTION
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - SCOPE_CONFIRMATION_AS_IMPLEMENTATION_AUTHORIZATION
    - COMPLEXITY_ROUTING_AND_EXECUTION_IN_ONE_NODE
  allowed_from:
  - N_EXISTING_PROCESS_IMPROVEMENT_ENTRY
  - N_LEGACY_INSTRUCTION_MIGRATION_ENTRY
  entry_modes:
  - root
  - resume
  - recovery
  - migration
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
