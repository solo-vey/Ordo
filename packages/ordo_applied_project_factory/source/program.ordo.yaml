    accept_change: Прийняти зміну
    correct_change: Скоригувати зміну
    defer_change: Відкласти зміну
    reject_change: Відхилити зміну
  on_answer:
    accept_change:
      label: зміна прийнята
      update_state:
        targeted_change_decision: approved
        approved_item_changes: $append:$answer.change
      next: N_TARGETED_MORE_IMPROVEMENTS_CHECK
    correct_change:
      label: зміна потребує корекції
      update_state:
        targeted_change_decision: needs_correction
      next: N_TARGETED_CHANGE_CLARIFICATION
    defer_change:
      label: зміна відкладена
      update_state:
        targeted_change_decision: deferred
        deferred_item_changes: $append:$answer.change
      next: N_TARGETED_MORE_IMPROVEMENTS_CHECK
    reject_change:
      label: зміна відхилена
      update_state:
        targeted_change_decision: rejected
        rejected_item_changes: $append:$answer.change
      next: N_TARGETED_MORE_IMPROVEMENTS_CHECK
