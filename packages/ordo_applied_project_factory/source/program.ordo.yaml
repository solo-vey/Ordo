- id: N_SHARED_TAIL_DELIVERY_TARGET_DECISION
  description: 'Shared tail delivery decision: after the canonical playbook contract and validation are stable, ARF recommends a delivery target and the analyst confirms engine runtime, prompt-only instructions, or both.'
  question: 'The canonical playbook is validated. Review the ARF recommendation and choose the delivery target: engine_runtime, prompt_only, or both. Prompt-only does not retain mechanical gates, runtime state validation, enforced transitions, CSG protection, or default runtime evidence capture.'
  answer_type: enum
  allowed_answers:
  - engine_runtime
  - prompt_only
  - both
  answer_options:
    engine_runtime: Full controlled ARF runtime package
    prompt_only: Lightweight model-instruction package
    both: Both packages from the same canonical Ordo source
  preconditions:
  - canonical_playbook_contract_stable
  - full_project_validation_status_ready
  recommendation_contract:
    assessment_inputs:
    - risk_level
    - branch_count
    - gate_count
    - backtrack_point_count
    - mechanical_enforcement_required
    - regulated_or_high_consequence
    - prompt_evidence
    safe_default: engine_runtime
    analyst_confirmation_required: true
    prompt_only_requires_sufficient_evidence: true
  user_facing_contract:
    show_recommended_target: true
    show_recommendation_reasons: true
    show_prompt_only_guarantees_lost: true
    do_not_ask_before_contract_stabilization: true
    allow_both: true
  on_answer:
    engine_runtime:
      label: full controlled runtime
      update_state:
        delivery_target: engine_runtime
        delivery_target_decision_status: confirmed
        engine_runtime_package_required: true
        prompt_only_package_required: false
      next: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
    prompt_only:
      label: lightweight model instructions
      update_state:
        delivery_target: prompt_only
        delivery_target_decision_status: confirmed_subject_to_evidence_gate
        engine_runtime_package_required: false
        prompt_only_package_required: true
        prompt_only_guarantee_loss_acknowledged: true
      next: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
    both:
      label: both delivery targets
      update_state:
        delivery_target: both
        delivery_target_decision_status: confirmed
        engine_runtime_package_required: true
        prompt_only_package_required: true
        prompt_only_guarantee_loss_acknowledged: true
      next: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_three_delivery_targets_and_show_safe_default
    max_attempts: 2
    on_exhausted:
      action: default_to_safe_target
      target: engine_runtime
      reason: delivery target remains unclear
  allowed_from:
  - N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE

  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
