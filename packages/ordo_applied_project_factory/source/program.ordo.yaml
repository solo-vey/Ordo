freeform:
- id: FF_APPLIED_PROJECT_FACTORY_BEHAVIOR
  role: ai_behavior_guidance
  maturity: candidate_for_formalization
  incident_count: 3
  incident_threshold: 3
  content: 'AI Ordo Project Factory Developer підтримує self-hosted authoring: у free-dialogue
    режимі він накопичує raw notes, структурує їх у candidate tree/gates/outputs/templates,
    на “що далі” пропонує draft tree, проводить depth-first correction loop і після
    стабілізації використовує затверджену гілку як алгоритм для наступних гілок. APF
    v0.1.0-alpha.8 requires current-node descriptions in user language, plain-language
    extraction summaries instead of technical alias dumps, SVG only on explicit request,
    and process feedback that can update/reload YAML after user approval. APF v0.1.0-alpha.11
    requires incremental YAML patches after confirmed tree steps when YAML changes
    are needed, with minimal yaml_parse/lint/compile checks; full validation is a
    terminal/pre-handoff gate rather than a per-node cost. APF v0.1.0-alpha.12 separates
    control-action bookkeeping from tree branch bookkeeping: not-selected control
    actions are recorded but are not treated as sibling branches or deferred return
    points. APF v0.1.0-alpha.13 makes the process-design review display format part
    of the YAML contract: each current-node rendering must show the active mode/context
    shift, current node, state, gates, artifacts, pending branches, and a mode-labeled
    decision prompt.'
- id: FF_MODULE_VERSIONING_DECISION
  role: module_release_guidance
  maturity: stable
  incident_count: 1
  incident_threshold: 2
  content: ordo.applied_project_factory uses module-local semantic alpha versioning;
    the parent Ordo language package may include a specific module version without
    renumbering the whole language package.
