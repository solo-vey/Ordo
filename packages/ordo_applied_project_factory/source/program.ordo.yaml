        draft_subtree_candidate: $answer.normalized_tree_draft
      next: N_DRAFT_SUBTREE_GENERATION
    needs_manual_tree_correction:
      label: correct manual tree input before join
      update_state:
        manual_tree_branch_2_adapter_status: needs_manual_input_correction
        manual_tree_missing_items: $answer.missing_items
        manual_tree_ambiguous_transitions: $answer.ambiguous_transitions
      next: N_MANUAL_TREE_ROOT_NODE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_if_manual_tree_is_structured_enough_or_needs_ai_draft_completion
    max_attempts: 2
    on_exhausted:
      action: continue_with_partial_or_sketch_join_generation
      reason: when unsure, route manual tree sketches through draft subtree generation
        before review
  description: Branch 2 join adapter. Complete/structured manual trees join N_DRAFT_SUBTREE_REVIEW_START;
    partial trees or sketches join N_DRAFT_SUBTREE_GENERATION. All downstream mechanics
    are reused from branch 1.
  allowed_from:
  - N_MANUAL_TREE_NORMALIZATION
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_FREE_DIALOGUE_INTAKE
  question: 'Вільний діалог: розповідайте потреби, ідеї, приклади, бажані outputs
    або проблеми без структурування дерева. AI накопичує raw notes і не вимагає YAML
    чи готової схеми.'
  answer_type: free_text
  on_answer:
    update_state:
      free_dialogue_notes: $answer
      free_dialogue_raw_notes: $answer
    next: N_FREE_DIALOGUE_STRUCTURED_EXTRACTION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: encourage_plain_language_needs_examples_outputs
    max_attempts: 2
    on_exhausted:
      action: continue_collecting_notes
      reason: free dialogue remains broad but usable
  description: Цей вузол дозволяє користувачу просто розповідати ідеї, потреби й приклади
    без вимоги знати YAML або будувати дерево рішень.
  allowed_from:
  - N_FACTORY_MODE_SELECTION
  - N_FREE_DIALOGUE_ACCUMULATION_CHECK
  - N_FREE_DIALOGUE_NEXT_SIGNAL
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_FREE_DIALOGUE_STRUCTURED_EXTRACTION
  question: 'AI показує людське резюме вільного діалогу: що ми почули, яке дерево
    починає вимальовуватись, які candidate nodes/gates/outputs/templates зʼявились,
    які outputs неясні або deferred, і які питання лишаються відкритими.'
  answer_type: plain_language_structured_review
  on_answer:
    update_state:
      free_dialogue_structured_notes: $answer
      extracted_domain_hints: $answer.domain_hints
      candidate_decision_nodes: $answer.candidate_nodes
      candidate_gates: $answer.candidate_gates
      candidate_outputs: $answer.candidate_outputs
      candidate_templates: $answer.candidate_templates
      candidate_open_questions: $answer.open_questions
      open_questions: $answer.open_questions
      self_hosted_authoring_loop_status: free_dialogue_notes_structured
      user_facing_extraction_policy:
        format: plain_language_sections
        confirmed_by_user: true
        technical_projection_internal: true
        avoid_yaml_style_alias_dump: true
      candidate_output_artifact_catalog: $answer.candidate_outputs
      candidate_template_hints: $answer.candidate_templates
      output_related_open_questions: $answer.output_related_open_questions
      free_dialogue_candidate_output_policy:
        outputs_may_be_known: true
        outputs_may_be_partial: true
        outputs_may_be_ai_proposed: true
        outputs_may_be_deferred: true
        outputs_may_be_absent: true
        extract_output_mentions_from_raw_notes: true
      free_dialogue_branch_3_consistency_status: candidate_outputs_extracted
    next: N_FREE_DIALOGUE_ACCUMULATION_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_plain_language_extraction_summary_and_ask_for_corrections_not_yaml_alias_dump
    max_attempts: 2
    on_exhausted:
      action: continue_with_explicit_open_questions
      reason: free dialogue notes extraction remains partial
  description: Free-dialogue extraction must preserve not only candidate nodes and
    gates, but also candidate output artifacts, candidate template hints, output-related
    open questions, and explicit known/partial/AI-proposed/deferred/no-output policy.
    Technical aliases remain internal; the user sees a plain-language summary.
  allowed_from:
  - N_FREE_DIALOGUE_INTAKE
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_FREE_DIALOGUE_ACCUMULATION_CHECK
  question: Чи достатньо вже накопиченого матеріалу, щоб чекати сигнал “що далі /
    сформулюй”, або треба ще продовжити вільний діалог?
  answer_type: enum
  allowed_answers:
  - continue_collecting
  - ready_for_what_next_signal
  answer_options:
    continue_collecting: Ще збираємо raw notes
    ready_for_what_next_signal: Матеріалу достатньо, чекаємо або приймаємо сигнал
      “що далі”
  on_answer:
    continue_collecting:
      label: ще нотатки
      update_state:
        self_hosted_authoring_loop_status: collect_more_free_dialogue
      next: N_FREE_DIALOGUE_INTAKE
    ready_for_what_next_signal:
      label: готово до “що далі”
      update_state:
        self_hosted_authoring_loop_status: ready_for_draft_trigger
      next: N_FREE_DIALOGUE_NEXT_SIGNAL
  on_unmatched_input:
    action: CLASSIFY.INTENT
    strategy: if_user_keeps_describing_route_to_intake_if_user_asks_next_route_to_signal
    max_attempts: 2
    on_exhausted:
      action: continue_collecting_notes
      reason: free dialogue accumulation readiness unclear
  description: 'Цей вузол перевіряє, чи вже досить матеріалу для першого draft дерева.
    Достатність матеріалу не вимагає фінальних outputs/templates: вони можуть бути
    candidate, AI-proposed або deferred, але output-related notes не мають губитися.'
  allowed_from:
  - N_FREE_DIALOGUE_STRUCTURED_EXTRACTION
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_FREE_DIALOGUE_NEXT_SIGNAL
  question: Користувач питає “що далі / що у нас виходить / давай сформулюємо” або
    явно просить draft. AI має запропонувати перший draft дерева, а не питати користувача
    з нуля.
  answer_type: enum
  allowed_answers:
  - keep_talking
  - formulate_draft_tree
  answer_options:
    keep_talking: Продовжити вільний діалог
    formulate_draft_tree: Сформувати перший draft дерева
  on_answer:
    keep_talking:
      label: продовжити діалог
      update_state:
        free_dialogue_readiness_signal: keep_talking
      next: N_FREE_DIALOGUE_INTAKE
    formulate_draft_tree:
      label: а що далі / сформулюй
      update_state:
        free_dialogue_readiness_signal: formulate_draft_tree
        self_hosted_authoring_loop_status: draft_requested_from_free_dialogue
      next: N_FREE_DIALOGUE_DRAFT_TREE_SUMMARY
  on_unmatched_input:
    action: CLASSIFY.INTENT
    strategy: if_user_asks_what_next_then_route_to_formulate_draft_tree
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: free dialogue next signal unclear
  description: Цей вузол ловить момент, коли користувач питає “що далі?” або “давай
    сформулюємо”, і переводить процес до першого draft дерева.
  allowed_from:
  - N_FREE_DIALOGUE_ACCUMULATION_CHECK
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_FREE_DIALOGUE_DRAFT_TREE_SUMMARY
  question: 'AI показує перший draft дерева з structured notes: вузли, гілки, state,
    gates, terminal candidates, candidate output artifacts, template hints, output-related
    open questions і місця майбутнього terminal output binding. Підтвердіть старт
    standard node/branch review.'
  answer_type: free_text
  on_answer:
    update_state:
      draft_tree_prototype: $answer
      draft_tree_review_status: draft_ready_for_review
      free_dialogue_draft_tree_ready: true
      self_hosted_authoring_loop_status: draft_tree_ready_for_node_review
      terminal_output_binding_points: $answer.terminal_output_binding_points
      terminal_output_bindings: $answer.terminal_output_bindings
      free_dialogue_terminal_output_binding_policy:
        terminal_points_use_shared_binding_loop: true
        selected_outputs_require_template_or_creation_loop: true
        mock_filled_examples_required: true
        no_output_and_deferred_are_explicit_statuses: true
      free_dialogue_branch_3_consistency_status: draft_tree_routes_to_shared_terminal_output_binding
    next: N_TREE_NODE_REVIEW_DISPLAY_CONTRACT
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_start_draft_tree_review
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: draft tree review not confirmed
  description: Free-dialogue draft tree is not final approval. After node/branch review,
    every terminal point uses the shared Terminal output binding + template verification
    loop, including mock-filled examples, before tree consolidation and source YAML
    approval.
  allowed_from:
  - N_FREE_DIALOGUE_NEXT_SIGNAL
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_TREE_NODE_REVIEW_DISPLAY_CONTRACT
  description: Перед покроковим узгодженням дерева модель погоджує з користувачем,
    як саме буде виглядати показ кожного вузла. Це захищає від технічного alias-first
    review і від прихованих state/gates/artifacts. For free-dialogue drafts, current-node
    review must also preserve candidate outputs/templates and route terminal points
    to the shared output binding loop.
  question: 'Підтвердіть формат review кожного вузла: показуємо людський опис, питання/дію,
    варіанти переходів, state, gates, artifacts/outputs/templates, open questions
    і deferred sibling-гілки. Технічні alias лишаються вторинними.'
  answer_type: enum
  allowed_answers:
  - confirm_review_format
  - adjust_review_format
  on_answer:
    confirm_review_format:
      label: підтвердити формат показу вузла
      update_state:
        node_review_display_contract:
          show_human_description: true
          show_question_or_action: true
          show_transition_options: true
          show_state_updates: true
          show_gates: true
          show_artifacts_outputs_templates: true
          show_open_questions_and_deferred_branches: true
          hide_technical_aliases_by_default: true
          details_expandable_on_request: true
          show_control_action_bookkeeping: true
          show_not_selected_control_actions: true
          show_blocked_until_ready_actions: true
        node_review_display_policy_status: confirmed
        node_review_ordo_layer_visibility: short_always_detailed_on_request
      next: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
    adjust_review_format:
      label: уточнити формат показу вузла
      update_state:
        node_review_display_contract: $answer
        node_review_display_policy_status: custom_confirmed
      next: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_whether_state_gates_artifacts_should_be_short_or_detailed
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: node review display contract remains unclear
  allowed_from:
  - N_FREE_DIALOGUE_DRAFT_TREE_SUMMARY
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  description: 'Цей вузол фіксує економний режим зміни YAML під час обходу дерева:
    після підтвердженого кроку вносимо тільки малий scoped patch, якщо він потрібен,
    і запускаємо мінімальну перевірку. Повна перевірка не виконується після кожного
    вузла.'
  question: 'Підтвердіть режим роботи під час обходу дерева: після кожного підтвердженого
    кроку, якщо YAML треба змінити, робимо малий YAML patch і мінімальну перевірку;
    повний CLI validation запускаємо тільки на terminal/pre-handoff gate або якщо
    мінімальна перевірка знаходить проблему.'
  answer_type: enum
  allowed_answers:
  - confirm_incremental_yaml_patch_policy
  - adjust_incremental_yaml_patch_policy
  answer_options:
    confirm_incremental_yaml_patch_policy: підтвердити incremental YAML patch + minimal
      check
    adjust_incremental_yaml_patch_policy: уточнити validation profile
  on_answer:
    confirm_incremental_yaml_patch_policy:
      label: incremental YAML patch policy confirmed
      update_state:
        incremental_yaml_update_policy:
          enabled: true
          when: after_each_confirmed_tree_step_if_yaml_change_is_needed
          write_mode: small_scoped_patch
          avoid_full_regeneration_on_each_node: true
        incremental_yaml_validation_profile:
          name: minimal_yaml_patch_check
          checks:
          - yaml_parse
          - cli_lint
          - cli_compile_refresh_ir
          full_validation_deferred_until:
          - terminal_branch
          - before_project_generation_or_handoff
        incremental_yaml_validation_status: confirmed_profile
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    adjust_incremental_yaml_patch_policy:
      label: custom incremental validation policy
      update_state:
        incremental_yaml_update_policy: $answer.policy
        incremental_yaml_validation_profile: $answer.validation_profile
        incremental_yaml_validation_status: custom_confirmed
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_minimal_patch_vs_full_validation_cadence
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: incremental YAML validation policy unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-INCREMENTAL-YAML-PATCH-AUTHORIZATION
    phase: before_repository_mutation
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: repository_state
    source_id: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
    input:
      state_projection:
      - pending_process_change
      - last_incremental_yaml_patch_summary
      - scope_confirmation_status
      - implementation_authorization_status
      - conversation.scope_confirmed
      - repository.mutation_started
      - authorization.repository_mutation
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - SCOPE_CONFIRMATION_AS_IMPLEMENTATION_AUTHORIZATION
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-INCREMENTAL-YAML-PATCH-IMPLEMENTATION-EVIDENCE
    phase: before_repository_mutation
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: process_trace
    source_id: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
    input:
      state_projection:
      - pending_process_change
      - last_incremental_yaml_patch_summary
      - source_yaml_created
      - semantic_ir_compiled
      - incremental_yaml_validation_status
      - artifacts.implementation_prompt
      - artifacts.source_code
      - artifacts.repository_patch
      - artifacts.tests
      - artifacts.implementation_artifacts
      - claims.implementation_complete
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PROMPT_AS_IMPLEMENTATION
  allowed_from:
  - N_PROCESS_FEEDBACK_CHANGE_CONFIRMATION
  - N_TREE_NODE_REVIEW_DISPLAY_CONTRACT
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_TREE_DEPTH_FIRST_REVIEW_LOOP
  question: 'Покажіть рівно один поточний вузол дерева для review у process-design
    rendering форматі: спочатку явно назвіть runtime mode/context shift (tree traversal,
    branch selection, node-review decision або execution gate), потім покажіть людський
    опис, питання/дію, варіанти переходів або control-дії, що запамʼятовується в state,
    які gates перевіряються, які artifacts/outputs/templates повʼязані, які open questions
    або sibling-гілки лишаються. Після показу вузла НЕ питати generic “підтверджуєш?”;
    перейти до control gate, де користувач обирає одну з дій: підтвердити, виправити
    або відкласти. Також покажіть control-action bookkeeping: selected_control_action,
    not_selected_control_actions і blocked_until_ready_actions окремо від unreviewed_sibling_branches/deferred_return_points.'
  answer_type: structured_list
  on_answer:
    update_state:
      current_tree_review_node: $answer.node
      approved_decision_tree: $answer.tree_snapshot
      tree_review_depth_first_complete: $answer.depth_first_complete
      draft_tree_review_status: in_review
      self_hosted_authoring_loop_status: node_review_in_progress
      confirmed_review_path: $answer.confirmed_path
      current_review_branch: $answer.current_branch
      unreviewed_sibling_branches: $answer.unreviewed_sibling_branches
      deferred_return_points: $answer.deferred_return_points
      current_node_review_record: $answer.current_node_review_record
      node_review_ordo_layer_visibility: short_always_detailed_on_request
      selected_control_action: $answer.selected_control_action
      not_selected_control_actions: $answer.not_selected_control_actions
      blocked_until_ready_actions: $answer.blocked_until_ready_actions
      current_process_layer_label: $answer.current_process_layer_label
      runtime_context_shift_notice: $answer.runtime_context_shift_notice
      current_node_display_block: $answer.current_node_display_block
    next: N_CURRENT_NODE_REVIEW_DECISION_GATE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_or_correct_current_node
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: current tree node review incomplete
  description: 'Поточний вузол review показується користувачу в user-facing process-design
    rendering форматі з явним mode label/context shift: tree traversal, branch selection,
    node-review decision або execution/validation gate. Runtime view must show state,
    gates, artifacts, pending sibling/deferred branches, and must not mix real unreviewed
    sibling branches with not-selected control actions.'
  allowed_from:
  - N_CURRENT_NODE_REVIEW_DECISION_GATE
  - N_DRAFT_SUBTREE_REVIEW_START
  - N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  - N_SHARED_TAIL_CORRECTION_LOOP
  - N_SHARED_TAIL_SOURCE_YAML_GENERATION
  - N_SUBTREE_REVIEW_COMPLETION_CHECK
  - N_TREE_REVIEW_CONTINUE_OR_APPROVE
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_CURRENT_NODE_REVIEW_DECISION_GATE
  description: 'Control/review gate для поточного вузла. Це не змістовий вузол дерева,
    який треба “підтвердити як частину дерева”, а runtime-рішення користувача щодо
    вже показаного вузла. Before asking, runtime must explicitly say: “Зараз це review-рішення
    по показаному вузлу, не вибір гілки дерева.” Після вибору action runtime фіксує
    selected_control_action і not_selected_control_actions; ці not-selected actions
    не додаються до deferred return points.'
  question: Що робимо з поточним показаним вузлом?
  answer_type: enum
  allowed_answers:
  - approve_current_node
  - correct_current_node
  - defer_current_node
  answer_options:
    approve_current_node: Підтвердити поточний вузол як є
    correct_current_node: Виправити поточний вузол і показати оновлену версію
    defer_current_node: Відкласти поточний вузол / винести в open questions або deferred
      return points
  on_answer:
    approve_current_node:
      label: вузол підтверджено
      update_state:
        current_node_review_decision: approved
        current_node_review_record.status: approved
        node_review_control_gate_status: passed
        confirmed_review_path: $answer.confirmed_path
        last_incremental_yaml_patch_summary: node approved; yaml patch only if current
          node definition changed
        selected_control_action: approve_current_node
        not_selected_control_actions:
        - correct_current_node
        - defer_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=approve_current_node;not_selected=correct_current_node,defer_current_node
        runtime_context_shift_notice: node_review_decision_completed_return_to_tree_traversal
      next: N_BRANCH_REVIEW
    correct_current_node:
      label: вузол потребує правки
      update_state:
        current_node_review_decision: needs_correction
        current_node_review_record.status: needs_correction
        corrected_review_nodes: $answer.corrections
        draft_tree_review_status: node_correction_in_progress
        node_review_control_gate_status: correction_requested
        last_incremental_yaml_patch_summary: correction requested; apply scoped YAML
          patch after corrected node is accepted
        selected_control_action: correct_current_node
        not_selected_control_actions:
        - approve_current_node
        - defer_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=correct_current_node;not_selected=approve_current_node,defer_current_node
        runtime_context_shift_notice: node_review_decision_requests_correction
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    defer_current_node:
      label: вузол відкладено
      update_state:
        current_node_review_decision: deferred
        current_node_review_record.status: deferred
        deferred_review_nodes: $answer.deferred_nodes
        deferred_return_points: $answer.deferred_return_points
        open_questions: $answer.open_questions
        node_review_control_gate_status: deferred
        last_incremental_yaml_patch_summary: node deferred; update deferred return
          points/open questions only
        selected_control_action: defer_current_node
        not_selected_control_actions:
        - approve_current_node
        - correct_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=defer_current_node;not_selected=approve_current_node,correct_current_node
        runtime_context_shift_notice: node_review_decision_deferred_return_point_recorded
      next: N_SUBTREE_REVIEW_COMPLETION_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_three_node_decision_options_approve_correct_defer
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: current node review decision unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-CURRENT-NODE-REVIEW-DECISION
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: runtime_state
    source_id: N_CURRENT_NODE_REVIEW_DECISION_GATE
    input:
      state_projection:
      - current_node_review_record
      - current_node_review_decision
      - unreviewed_sibling_branches
      - deferred_return_points
      - blocked_until_ready_actions
      - selected_control_action
      - process.required_stages
      - process.completed_stages
      - process.stage_order
      - process.current_stage
      - node.decisions
      - node.responsibilities
      - node.execution_started
      - node.route_explicit
      - node.authorization_explicit
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_CURRENT_NODE_REVIEW_DECISION_GATE
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - MANDATORY_BRANCH_SHORT_CIRCUIT
    - COMPLEXITY_ROUTING_AND_EXECUTION_IN_ONE_NODE
  allowed_from:
  - N_TREE_DEPTH_FIRST_REVIEW_LOOP
