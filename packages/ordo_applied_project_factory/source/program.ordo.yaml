    readiness is ready_for_handoff.'
  question: 'Процес готовий до handoff. Згенерувати handoff package: source YAML,
    compiled artifacts, validation report, output/template catalog, terminal binding
    summary, alpha limitations, unfinished/removed items log, changelog/release notes,
    usage/start prompt notes.'
  answer_type: enum
  allowed_answers:
  - handoff_package_generated
  - handoff_package_failed
  answer_options:
    handoff_package_generated: Handoff package generated
    handoff_package_failed: Handoff package generation failed
  user_facing_contract:
    file_first_handoff_package: true
    show_package_summary_card: true
    include_download_link: true
    show_alpha_limitations: true
    do_not_generate_if_final_readiness_not_ready: true
  on_answer:
    handoff_package_generated:
      label: handoff package ready
      update_state:
        handoff_package_status: ready
        handoff_package:
          package_status: generated
          package_files: $answer.files
          package_summary: $answer.summary
      next: N_SHARED_TAIL_FINAL_HANDOFF
    handoff_package_failed:
      label: handoff package failed
      update_state:
        handoff_package_status: failed
        open_correction_items: $append:$answer.issue
      next: N_SHARED_TAIL_CORRECTION_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_handoff_package_generated_or_failed
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: handoff package status unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-HANDOFF-PACKAGE-GENERATION
    phase: before_package_finalization
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: package_state
    source_id: N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
    input:
      state_projection:
      - process_package_status
      - full_project_validation_status
      - unfinished_output_templates
      - terminal_path_ready_records
      - artifact_review_mode_policy
      - artifacts.implementation_prompt
      - artifacts.source_code
      - artifacts.repository_patch
      - artifacts.tests
      - artifacts.implementation_artifacts
      - claims.implementation_complete
      - package.structure_valid
      - package.missing_mandatory_artifacts
      - package.final_label
      - evidence.supports_final_label
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_SHARED_TAIL_CORRECTION_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PROMPT_AS_IMPLEMENTATION
    - PACKAGE_VALIDATION_WITHOUT_COMPLETENESS_VALIDATION
    - FINAL_LABEL_OVERCLAIM
  allowed_from:
  - N_SHARED_TAIL_DELIVERY_TARGET_DECISION

  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_SHARED_TAIL_FINAL_HANDOFF
  description: 'Shared tail step 8: final handoff decision after package generation.
    User either accepts the package or returns it for revision.'
  question: Handoff package готовий. Прийняти package або повернутись до правок?
  answer_type: enum
  allowed_answers:
  - accept_handoff_package
  - return_to_revision
  answer_options:
    accept_handoff_package: Прийняти handoff package
    return_to_revision: Повернутись до правок
  user_facing_contract:
    show_final_handoff_summary: true
    show_package_link: true
    show_validation_status_without_overclaiming: true
    show_alpha_limitations_if_any: true
    only_two_actions:
    - accept_handoff_package
    - return_to_revision
  on_answer:
    accept_handoff_package:
      label: handoff accepted
      update_state:
        handoff_status: accepted
        process_package_status: ready_for_use_or_next_review
      next: END_HANDOFF_ACCEPTED
    return_to_revision:
      label: handoff returned for revision
      update_state:
        handoff_status: returned_for_revision
        revision_loop_status: opened
      next: N_SHARED_TAIL_CORRECTION_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_accept_handoff_or_return_to_revision
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: final handoff decision unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-FINAL-HANDOFF
    phase: before_final_status_claim
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: evidence_state
    source_id: N_SHARED_TAIL_FINAL_HANDOFF
    input:
      state_projection:
      - handoff_status
      - process_package_status
      - full_project_validation_status
      - accepted_deferred_for_alpha
      - antipattern_gate_status
      - antipattern_findings
      - package.structure_valid
      - package.missing_mandatory_artifacts
      - package.final_label
      - evidence.supports_final_label
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_SHARED_TAIL_CORRECTION_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PACKAGE_VALIDATION_WITHOUT_COMPLETENESS_VALIDATION
    - FINAL_LABEL_OVERCLAIM
  allowed_from:
  - N_SHARED_TAIL_HANDOFF_PACKAGE_GENERATION
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: END_HANDOFF_ACCEPTED
  description: 'Terminal marker: handoff package accepted and process package ready
    for use or next review.'
  terminal: true
  required_fields: []
  on_enter:
    update_state:
      handoff_status: accepted
      process_package_status: ready_for_use_or_next_review
  on_unmatched_input:
    action: IGNORE
    reason: terminal node
  allowed_from:
  - N_SHARED_TAIL_FINAL_HANDOFF
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
