coverage_rules:
- kind: coverage_rule
  id: COVERAGE_CONFIRMED_FACTORY_CONTRACTS_TO_ARTIFACTS
  input: confirmed_contracts
  output: artifact_requirements
  failure_policy: no_go
  description: Every confirmed factory contract must have artifact coverage.
go_no_go:
  kind: go_no_go
  status: go
  blocking_issues: []
  warnings:
  - M61.1 intentionally defers confusion/self-test generation until a later milestone.
  - M61.5 stabilizes the free-dialogue branch as a self-hosted authoring loop; confusion/self-test
    generation remains deferred.
  - M61.6 adds focused/context SVG-by-default policy and a language-improvement proposal
    artifact for provisional language gaps.
  - APF v0.1.0-alpha.8 makes SVG generation on-request only and requires user-facing
    node descriptions, plain-language extraction summaries, and a process-feedback
    YAML reload loop.
  - APF v0.1.0-alpha.11 uses incremental YAML patches with minimal checks during tree
    review; full CLI validation is deferred to terminal/pre-handoff gate.
  - APF v0.1.0-alpha.12 separates unreviewed sibling branches from not-selected/blocked
    control actions during runtime review.
gates:
- id: G_FACTORY_AUTHORING_MODE_SELECTED
  method: mechanical
  trust_class: deterministic
  condition: state.factory_authoring_mode is not null
  on_fail: block
- id: G_APPLIED_PROJECT_GOAL_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.applied_project_goal is not null
  on_fail: block
- id: G_APPLIED_PROCESS_TYPE_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.applied_process_type is not null
  on_fail: block
- id: G_RUNTIME_ROLES_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.runtime_human_role is not null and state.runtime_ai_role is not
    null
  on_fail: block
- id: G_RUNTIME_ENTRY_POINT_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.runtime_entry_point is not null
  on_fail: block
- id: G_STATE_SCHEMA_BLUEPRINT_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.state_schema_blueprint is not empty
  on_fail: block
- id: G_FIRST_RELEASE_SOURCE_YAML_ONLY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.first_release_output_scope is not null
  on_fail: block
- id: G_APPROVAL_TO_GENERATE_SOURCE_YAML
  method: mechanical
  trust_class: deterministic
  condition: state.approval_to_generate_source_yaml is true
  on_fail: block
- id: G_DOMAIN_OPEN_QUESTIONS_TRIAGED
  method: human
  trust_class: human_decision
  condition: open questions are classified as blocking_now, defer_until_tree, defer_until_compile,
    or defer_to_runtime_project
  on_fail: block
- id: G_MODULE_VERSIONING_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.module_versioning_policy is not null and state.module_versioning_policy_status
    is not null
  on_fail: block
  description: Confirms Project Factory has its own module-local versioning independent
    from the parent language package version.
- id: G_SOURCE_YAML_GENERATION_REQUIRES_APPROVAL
  method: mechanical
  trust_class: deterministic
  condition: state.source_yaml_generation_approval == approved or state.approval_to_generate_source_yaml
    is true
  on_fail: block
  description: source/program.ordo.yaml generation/update requires explicit user approval
    and visible scope.
- id: G_OUTPUT_ARTIFACT_CATALOG_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.output_artifact_catalog is not empty
  on_fail: block
- id: G_CANDIDATE_OUTPUTS_AND_TEMPLATES_CAPTURED
  method: mechanical
  trust_class: deterministic
  condition: state.candidate_outputs is not empty and state.candidate_templates is
    not empty
  on_fail: block
- id: G_AUTO_SVG_ON_REQUEST_ONLY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms SVG is not generated automatically during runtime review;
    context SVG is produced only when explicitly requested.
  condition: state.auto_svg_generation_policy.generate_only_when_user_explicitly_requests
    is true
  on_fail: block
- id: G_USER_FACING_NODE_DESCRIPTIONS_ENABLED
  method: mechanical
  trust_class: deterministic
  description: Confirms every current-node review should include a human-readable
    node description in the user language.
  condition: state.user_facing_node_description_policy.include_in_current_node_block
    is true
  on_fail: block
- id: G_USER_FACING_EXTRACTION_SUMMARY_ENABLED
  method: mechanical
  trust_class: deterministic
  description: Confirms free-dialogue extraction is presented as a plain-language
    summary before any technical projection.
  condition: state.user_facing_extraction_policy.avoid_yaml_style_alias_dump is true
  on_fail: block
- id: G_CONTROL_ACTION_BOOKKEEPING_SEPARATED
  method: mechanical
  trust_class: deterministic
  description: Ensures runtime review separates real unreviewed sibling branches from
    not-selected or blocked control actions.
  condition: state.control_action_bookkeeping_policy.separate_from_tree_branches is
    true and state.not_selected_control_actions is not null and state.blocked_until_ready_actions
    is not null
  on_fail: block
- id: G_INCREMENTAL_YAML_PATCH_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms tree review uses small scoped YAML patches and minimal checks
    after confirmed steps instead of full regeneration/validation after every node.
  condition: state.incremental_yaml_update_policy.enabled is true and state.incremental_yaml_validation_profile.name
    is not null
  on_fail: block
- id: G_MINIMAL_YAML_PATCH_CHECK_DEFINED
  method: mechanical
  trust_class: deterministic
  description: Confirms the minimal per-step validation profile is defined as YAML
    parse plus minimal CLI checks.
  condition: state.minimal_yaml_patch_check_defined is true
  on_fail: block
- id: G_LANGUAGE_IMPROVEMENT_PROPOSALS_CAPTURED_OR_EMPTY
  method: mechanical
  trust_class: deterministic
  description: Blocks readiness until missing-language-feature proposals are either
    captured in the proposal artifact or explicitly marked as none detected.
  condition: state.language_improvement_proposals_status is not null
  on_fail: block
- id: G_PROCESS_FEEDBACK_LOOP_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms process feedback can update the APF YAML after user approval,
    then reload and continue from the updated process.
  condition: state.process_feedback_policy_status is not null
  on_fail: block
- id: G_DECISION_TREE_BLUEPRINT_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.decision_tree_blueprint is not empty
  on_fail: block
- id: G_TREE_REVIEW_DEPTH_FIRST_APPROVED
  method: mechanical
  trust_class: deterministic
  condition: state.tree_review_depth_first_complete is true
  on_fail: block
- id: G_BASIC_TEST_CASES_AFTER_TREE_APPROVAL
  method: mechanical
  trust_class: deterministic
  condition: state.basic_test_case_catalog is not empty
  on_fail: block
- id: G_FREE_DIALOGUE_NOTES_STRUCTURED
  method: mechanical
  trust_class: deterministic
  condition: state.free_dialogue_structured_notes is not empty
  on_fail: block
- id: G_FREE_DIALOGUE_DRAFT_TREE_READY
  method: mechanical
  trust_class: deterministic
  condition: state.free_dialogue_draft_tree_ready is true
  on_fail: block
- id: G_SELF_HOSTED_BRANCH_STABILIZED
  method: mechanical
  trust_class: deterministic
  condition: state.stabilized_tree_branch is not null and state.self_hosted_reuse_enabled
    is true
  on_fail: block
- id: G_FOCUSED_CONTEXT_SVG_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Blocks readiness until the factory confirms that focused/context SVG
    is the default visualization while working on a specific tree branch.
  condition: state.graph_rendering_policy_status is not null and state.current_graph_rendering_mode
    is not null
  on_fail: block
- id: G_GRAPH_ANNOTATION_OVERLAY_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.graph_annotation_overlay_policy is not null and state.graph_annotation_overlay_status
    is not null
  on_fail: warn
  description: Confirms how graph generator v1.1 annotation overlay is used as an
    optional review layer.
- id: G_NODE_REVIEW_DISPLAY_CONTRACT_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.node_review_display_policy_status is not null
  on_fail: block
- id: G_NODE_REVIEW_TRACKS_SIBLING_BRANCHES
  method: mechanical
  trust_class: deterministic
  condition: state.confirmed_review_path is not empty and state.current_review_branch
    is not null and state.unreviewed_sibling_branches is not empty and state.deferred_return_points
    is not empty
  on_fail: block
- id: G_CURRENT_NODE_REVIEW_INCLUDES_ORDO_LAYER
  method: mechanical
  trust_class: deterministic
  condition: state.current_node_review_record is not null
  on_fail: block
- id: G_CURRENT_NODE_REVIEW_DECISION_EXPLICIT
  method: human
  trust_class: human_decision
  description: Blocks forward progress until the user chooses approve/correct/defer
    for the currently displayed node; generic confirmation is not enough when options
    exist.
  condition: state.current_node_review_decision in [approved, needs_correction, deferred]
    and state.node_review_control_gate_status is not null
  on_fail: block
- id: G_PROCESS_DESIGN_REVIEW_RENDERING_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms APF has a durable user-facing rendering contract for process-design
    review, including mode labels/context-shift notices and current-node state/gates/artifacts
    sections.
  condition: state.process_design_review_rendering_policy.enabled is true and state.process_design_review_rendering_policy.required_sections_for_current_node_rendering
    is not empty
  on_fail: block
- id: G_CURRENT_NODE_RENDERING_HAS_CONTEXT_SHIFT_LABEL
  method: human
  trust_class: human_decision
  description: 'Blocks ambiguous user-facing process review prompts: every current-node
    display must indicate whether the user is choosing a tree branch, reviewing a
    node, or passing an execution/validation gate.'
  condition: state.runtime_context_shift_notice is not null or state.current_process_layer_label
    is not null
  on_fail: block
- id: G_ALL_STARTUP_BRANCHES_JOIN_SHARED_PATHS
  method: mechanical
  trust_class: deterministic
  condition: state.all_startup_branches_join_shared_paths is true
  on_fail: block
  description: All four startup modes must join the shared output/template subflow
    where terminal outputs are involved and the shared validation/handoff tail before
    handoff.
- id: G_OUTPUT_TEMPLATE_CATALOG_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.output_template_catalog is not empty
  on_fail: block
- id: G_SHARED_OUTPUT_TEMPLATE_SUBFLOW_CLOSED
  method: mechanical
  trust_class: deterministic
  condition: state.shared_output_template_subflow_status is one of closed
  on_fail: block
  description: The shared output/template subflow has completed human review and is
    available to all startup branches.
- id: G_DOCUMENT_ARTIFACTS_USE_FILE_FIRST_REVIEW
  method: mechanical
  trust_class: deterministic
  condition: state.document_artifacts_file_first_review_verified is true
  on_fail: block
  description: Document-like artifacts must be reviewed through a downloadable file
    package unless explicitly short enough for inline preview.
- id: G_REVIEW_PACKAGE_HAS_TEMPLATE_MOCK_MAPPING
  method: mechanical
  trust_class: deterministic
  condition: state.review_package_template_mock_mapping_verified is true
  on_fail: block
  description: A review package is incomplete without template, mock-filled example,
    and state-field mapping report.
- id: G_VALIDATION_GATE_CATALOG_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.validation_gate_catalog is not empty
  on_fail: block
- id: G_FULL_VALIDATION_DEFERRED_TO_TERMINAL_GATE
  method: mechanical
  trust_class: deterministic
  description: Confirms full CLI validation is a terminal/pre-handoff gate, not a
    per-node operation during tree review.
  condition: state.full_project_validation_policy.run_when is not empty and state.full_project_validation_required_before_handoff
    is true
  on_fail: block
- id: G_FULL_PROJECT_VALIDATION_PASSED_BEFORE_HANDOFF
  method: mechanical
  trust_class: deterministic
  description: Blocks final/release handoff until full validation passed; for alpha,
    explicit skipped_for_alpha limitation may continue only through the shared tail
    readiness gate.
  condition: state.full_project_validation_passed_or_alpha_exception is true
  on_fail: block
- id: G_UNFINISHED_TEMPLATE_BLOCKS_ARTIFACT_USE
  method: mechanical
  trust_class: deterministic
  condition: state.no_active_output_artifact_has_template_status_unfinished is true
  on_fail: block
  description: Unfinished templates cannot be used for artifact generation; user must
    complete or remove the artifact.
- id: G_TERMINAL_PATH_HAS_NO_UNFINISHED_ACTIVE_ARTIFACTS
  method: mechanical
  trust_class: deterministic
  condition: state.terminal_path_has_no_unfinished_active_artifacts is true
  on_fail: block
  description: Terminal path readiness requires no unfinished active artifacts/templates.
- id: G_SHARED_VALIDATION_HANDOFF_TAIL_CLOSED
  method: mechanical
  trust_class: deterministic
  condition: state.shared_validation_handoff_tail_status is one of closed
  on_fail: block
  description: The shared validation/handoff tail has completed human review and is
    the reusable final path for all startup branches.
- id: G_MINIMAL_VALIDATION_PASSED_BEFORE_HANDOFF
  method: mechanical
  trust_class: deterministic
  condition: state.minimal_validation_status is one of passed
  on_fail: block
  description: Handoff is blocked if minimal validation failed or has not run.
- id: G_SKIPPED_FULL_VALIDATION_RECORDED_AS_ALPHA_LIMITATION
  method: mechanical
  trust_class: deterministic
  condition: state.skipped_full_validation_recorded_or_not_skipped is true
  on_fail: block
  description: Skipped full validation is allowed for alpha only as an explicit limitation,
    never as passed.
- id: G_FINAL_READINESS_HAS_NO_ACTIVE_BLOCKERS
  method: mechanical
  trust_class: deterministic
  condition: state.final_readiness_has_no_active_blockers is true
  on_fail: block
  description: Handoff package generation requires no active blockers.
- id: G_HANDOFF_PACKAGE_REQUIRES_FILE_FIRST_SUMMARY
  method: mechanical
  trust_class: deterministic
  condition: state.handoff_package_file_first_summary_ready is true
  on_fail: block
  description: Final handoff must provide a file-first package plus a short summary.
- id: G_WHOLE_TREE_INTEGRATION_REVIEW_CLOSED
  method: mechanical
  trust_class: deterministic
  condition: state.whole_tree_integration_review_status is one of closed_human_review
  on_fail: block
  description: Whole-tree integration review must be closed before alpha.20 handoff/integration
    package is treated as integrated.
- id: G_NO_UNRESOLVED_ACTIVE_ORPHANS_AFTER_STRUCTURAL_SCAN
  method: mechanical
  trust_class: deterministic
  condition: state.no_unresolved_active_orphans_after_structural_scan is true
  on_fail: block
  description: Real structural scan must not contain active unresolved orphan nodes.
    Deprecated legacy compatibility nodes are allowed only when explicitly marked.
