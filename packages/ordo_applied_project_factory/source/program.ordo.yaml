    - state_transition_validation
    - next_step_validation
    - output_template_validation
    - factory_output_validation
    - repo_release_integrity
    do_not_silently_skip_full_validation: true
    skipped_full_validation_is_limitation_not_passed: true
  on_answer:
    run_full_validation:
      label: full validation requested
      update_state:
        full_validation_decision: run_now
        full_validation_status: running_or_pending
      next: N_SHARED_TAIL_VALIDATION_RESULT_REVIEW
    skip_full_validation_for_alpha:
      label: full validation skipped for alpha
      update_state:
        full_validation_decision: skipped_for_alpha
        full_validation_status: skipped
        full_validation_limitation_recorded: true
        accepted_alpha_limitations: $append:full_validation_skipped_for_alpha
      next: N_SHARED_TAIL_FINAL_UNFINISHED_ITEMS_GATE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_run_full_validation_or_skip_for_alpha
