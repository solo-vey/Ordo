flow_reuse:
  maturity: stable_optional
  joins:
  - id: JOIN.OUTPUT.TEMPLATE.READY
    namespace: apf.output_template
    incoming:
    - node: N_OUTPUT_TEMPLATE_REVIEW_LOOP
      namespace: apf.graph
      alias: reviewed
    - node: N_OUTPUT_TEMPLATE_CREATION_LOOP
      namespace: apf.graph
      alias: created
    target:
      node: N_TERMINAL_PATH_READY_CHECK
      namespace: apf.graph
    state_contract:
      required_fields:
      - active_artifact_id
      - template_status
      protected_fields:
      - active_artifact_id
      optional_fields:
      - template_review_notes
      branch_local_fields:
      - draft_preview
    merge_policy:
      default: require_equal
      fields:
        template_status: require_equal
        template_review_notes: prefer_non_null
    conflict_policy: require_equal
    provenance_policy: preserve_all_inputs
  - id: JOIN.VALIDATION.RESULT
    namespace: apf.validation_handoff
    incoming:
    - node: N_SHARED_TAIL_FULL_VALIDATION_DECISION
      namespace: apf.graph
      alias: full_validation_selected
    - node: N_SHARED_TAIL_MINIMAL_VALIDATION
      namespace: apf.graph
      alias: minimal_only
