- id: N_SHARED_TAIL_FULL_VALIDATION_DECISION
  description: 'Shared tail step 3: decide whether to run full validation now or explicitly
    skip it for alpha. Skipped is recorded as a limitation and never as passed.'
  question: Minimal validation passed. Запустити full validation зараз чи явно пропустити
    її для alpha?
  answer_type: enum
  allowed_answers:
  - run_full_validation
  - skip_full_validation_for_alpha
  answer_options:
    run_full_validation: Запустити full validation
    skip_full_validation_for_alpha: Пропустити full validation для alpha
  user_facing_contract:
    explain_full_validation_scope:
