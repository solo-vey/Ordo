  question: 'Підтвердіть стандарт візуалізації: під час звичайної покрокової роботи
    SVG не генерується автоматично. Якщо користувач прямо просить картинку, тоді генерується
    context-view: шлях від root до поточного вузла плюс піддерево нижче нього.'
  answer_type: enum
  allowed_answers:
  - confirm_on_request_context_svg_policy
  - adjust_policy
