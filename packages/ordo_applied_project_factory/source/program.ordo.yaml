  - N_LEGACY_MIGRATION_COMPLETENESS_GATE
  node_context:
    version: '1.0'
    required_state:
    - current_node
    knowledge_refs: []
    allowed_tools: []
    output_contract:
      state_diff: required
      next_node: explicit
- id: N_SHARED_TAIL_MINIMAL_VALIDATION
  description: 'Shared tail step 2: minimal technical validation after YAML generation.
    Failed validation shows a short issue list and routes to correction or blocked
    defer, not a separate show-details branch.'
  question: 'Запустити minimal validation: YAML parse, Ordo lint, Ordo compile, structural
    next-reference check, and basic orphan/dead-end check.'
  answer_type: enum
  allowed_answers:
  - minimal_validation_passed
  - minimal_validation_failed_start_correction
  - minimal_validation_failed_defer_fix
  answer_options:
    minimal_validation_passed: Minimal validation passed
    minimal_validation_failed_start_correction: Minimal validation failed → перейти
      до виправлення
    minimal_validation_failed_defer_fix: Minimal validation failed → відкласти виправлення,
      handoff blocked
  user_facing_contract:
    show_short_issue_list_on_failure: true
    details_are_inside_correction_mode: true
    do_not_offer_separate_show_details_branch: true
    handoff_blocked_if_failed: true
  on_answer:
    minimal_validation_passed:
      label: minimal validation passed
      update_state:
        minimal_validation_status: passed
      next: N_SHARED_TAIL_FULL_VALIDATION_DECISION
    minimal_validation_failed_start_correction:
      label: minimal validation failed; correction mode
      update_state:
        minimal_validation_status: failed
        validation_issues: $answer.issues
        validation_fix_status: correction_loop_started
      next: N_SHARED_TAIL_CORRECTION_LOOP
    minimal_validation_failed_defer_fix:
      label: minimal validation failed; fix deferred and handoff blocked
      update_state:
        minimal_validation_status: failed
        validation_issues: $answer.issues
        validation_fix_status: deferred
        handoff_blocked: true
      next: STOP_VALIDATION_FIX_DEFERRED_HANDOFF_BLOCKED
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_minimal_validation_passed_or_failed_correction_or_defer
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: minimal validation result unclear
  antipattern_hooks:
  - schema_version: ordo.antipattern_wiring_hook.v1
    hook_id: APH-SHARED-TAIL-MINIMAL-VALIDATION
    phase: after_state_update_before_transition
    adapter:
      module: language.integration.antipattern_gate_adapter
      class: AntipatternGateAdapter
      method: evaluate_gate
      activation_profile: language/integration/antipattern_activation_profile.apf.v1.json
    context_type: evidence_state
    source_id: N_SHARED_TAIL_MINIMAL_VALIDATION
    input:
      state_projection:
      - syntax_checked
      - semantic_ir_compiled
      - incremental_yaml_validation_status
      - validation_findings_requiring_tree_correction
      - unfinished_output_templates
      - artifacts.implementation_prompt
      - artifacts.source_code
      - artifacts.repository_patch
      - artifacts.tests
      - artifacts.implementation_artifacts
      - claims.implementation_complete
      - package.structure_valid
      - package.missing_mandatory_artifacts
      source_hash_ref: null
      required_signals_policy: explicit_projection_must_cover_blocking_rules
    output:
      report_state_field: antipattern_gate_report
      findings_state_field: antipattern_findings
      gate_status_state_field: antipattern_gate_status
      evidence_refs_state_field: antipattern_evidence_refs
    decision_policy:
      block: stop_transition_and_route_to_repair
      allow_with_advisory: continue_and_persist_findings
      allow: continue_and_persist_report
      inconclusive: block_when_required_signals_missing_for_blocking_rule
    routing:
      on_block:
        action: route_to_repair
        repair_target: N_SHARED_TAIL_CORRECTION_LOOP
      on_allow:
        action: continue_transition
      on_advisory:
        action: continue_transition_with_evidence
    enabled_antipattern_overrides:
    - PROMPT_AS_IMPLEMENTATION
    - PACKAGE_VALIDATION_WITHOUT_COMPLETENESS_VALIDATION
  allowed_from:
  - N_SHARED_TAIL_CORRECTION_LOOP
