runtime_capabilities:
  SESSION_PACKAGE_LOAD_AND_CACHE:
    status: integrated
    state_schema: ordo.apf.package_cache_state.v1
    implementation: cli/ordo/package_cache.py
    entrypoint: ensure_package_cache
    policy:
      load_once: true
      reuse_validated_cache: true
      repeat_unpack_or_full_read_when_unchanged: forbidden
      reload_conditions:
      - package_version_changed
      - package_fingerprint_changed
      - cache_state_missing_or_invalid
      - unpacked_location_unavailable
      - required_cached_file_missing
      - manifest_validation_failed
      - explicit_reload_requested
      process_state_preservation: required
      active_node_preservation: required
    gate:
      id: PACKAGE_RELOAD_NECESSITY_GATE
      mode: fail_closed
      cache_hit_requires:
      - matching_package_version
      - matching_sha256_fingerprint
      - cache_valid
      - manifest_validated
      - source_of_truth_loaded
      - unpacked_location_available
      - required_files_available
    trace_events:
    - PACKAGE_CACHE_HIT
    - PACKAGE_CACHE_MISS
    - PACKAGE_RELOAD_REQUIRED
    - PACKAGE_RELOAD_COMPLETED
    - PACKAGE_CACHE_INVALIDATED
process_rail:
  rail_id: ORDO_APPLIED_PROJECT_FACTORY_RAIL
  purpose: 'Створити прикладний Ordo-проєкт будь-якого типу через guided dialogue.
    Factory підтримує три режими authoring: доменна модель + дерево рішень, ручне
    дерево рішень, та вільний діалог із подальшим draft-tree review. AI приховує YAML
    від PM/аналітика і видає перший output як source/program.ordo.yaml після погодження
    blueprint. M61.5 стабілізує free-dialogue гілку як self-hosted authoring loop:
    raw notes → structured extraction → draft tree → node-by-node review → reusable
    stabilized branch. APF v0.1.0-alpha.8 додає user-facing node descriptions, human-readable
    extraction summaries, on-request-only SVG generation, and a confirmed process-feedback
    loop: feedback → proposed process change → user approval → YAML update/reload
    → continue from the updated flow. APF v0.1.0-alpha.10 adds strict node-by-node
    user-facing review: each current-node block must show human description, question/action,
    transitions, state, gates, artifacts/templates, and open/deferred branches; the
    runtime must track confirmed path, current branch, unreviewed sibling branches,
    and deferred return points. APF v0.1.0-alpha.11 adds incremental YAML patch discipline:
    after each confirmed tree step, runtime writes only a scoped YAML patch when needed
    and runs a minimal YAML/lint/compile check; full CLI validation is deferred to
    terminal branch gates, before project generation/handoff, or when consistency
    findings require it. APF v0.1.0-alpha.11 adds decision/control gate discipline:
    when a current node has explicit transition options, runtime must ask the user
    to choose an allowed action instead of asking only for generic confirmation; node
    approval/correction/deferment is represented as a reusable control gate. APF v0.1.0-alpha.13
    adds a process-design review rendering contract: when reviewing or designing the
    process tree, the runtime must explicitly show whether it is in tree traversal,
    branch selection, node-review decision, or execution/validation gate mode; each
    current-node block must include state, gates, artifacts, pending sibling/deferred
    branches, and a mode-labeled decision prompt. APF v0.1.0-alpha.14 commits the
    fourth startup mode: existing-process improvement. This branch accepts only a
    full workspace/dev package archive or a self-contained source/program.ordo.yaml
    as baseline, supports batch improvement lists and targeted dialogue improvements,
    reviews before/after changes, builds a confirmed change set, applies scoped YAML
    patches, runs minimal validation, then joins the existing shared full-validation/handoff
    pipeline without duplicating it. APF v0.1.0-alpha.16 closes branch 1 human review:
    runtime_entry_point is moved after domain/input/output/open-question intake; input
    artifacts are policy-based and optional; output artifacts are separated from templates;
    terminal points bind outputs and verify templates with mock-filled examples; static
    tree blueprint is replaced with progressive tree authoring and explicit terminal-or-continue
    decisions. APF v0.1.0-alpha.16 closes the free-dialogue branch consistency delta
    after alpha.15: structured extraction must preserve candidate output artifacts,
    template hints, output-related open questions, and unknown/deferred/no-output
    policies; terminal points from free-dialogue draft review use the shared terminal
    output binding + template/mock-example verification loop and join the shared full-validation/handoff
    tail without duplication. APF v0.1.0-alpha.17 closes the manual-tree branch as
    an entry adapter: user-supplied manual trees in human formats are captured as
    manual_tree_input, normalized into normalized_tree_draft, checked for completeness,
    then joined into the already-confirmed branch-1 shared path at N_DRAFT_SUBTREE_REVIEW_START
    when structurally sufficient or N_DRAFT_SUBTREE_GENERATION when partial/sketch-like;
    downstream review, terminal output binding, template/mock-example verification,
    YAML approval, and full validation/handoff remain shared and non-duplicated. APF
    v0.1.0-alpha.18 closes the shared terminal output/template subflow as a reusable
    block across all startup branches: terminal points explicitly choose an output
    policy; new artifacts are described by free-form artifact intent rather than fixed
    type lists; the runtime shows available terminal state fields, derives an output
    recipe with direct-insert vs generated sections, and uses file-first review packages
    for document-like artifacts. Template/mock/mapping review is simplified to four
    user decisions: confirm, revise, defer, or remove artifact. Deferred templates
    are recorded as unfinished and cannot be used by final gates until completed or
    removed. APF v0.1.0-alpha.19 closes the shared validation/handoff tail as the
    reusable final path for all startup branches and shared subflows: source YAML
    generation approval, minimal validation, full-validation decision, validation
    result review, scoped correction loop, final unfinished-items gate, handoff package
    generation, and final handoff. Validation failure UX is simplified: failed checks
    show a short issue list and route either into correction mode or a blocked/deferred
    state; details live inside correction mode. Skipped full validation for alpha
    is recorded as a limitation, never as passed. Handoff package generation is file-first
    and blocked by failed minimal validation or active unfinished artifacts/templates.
    APF v0.1.0-alpha.20 closes the whole-tree integration review after the branch
    and shared-tail closures: all four startup branches join the shared output/template
    subflow and shared validation/handoff tail; terminal/deferred/unfinished gates
    are aligned; legacy unreachable nodes are explicitly marked as deprecated compatibility
    nodes rather than active orphans; structural scan results are recorded in the
    alpha.20 validation report.'
  state_tracking: required
  allow_deviation: true
  require_resume_after_deviation: true
  backtracking: enabled
