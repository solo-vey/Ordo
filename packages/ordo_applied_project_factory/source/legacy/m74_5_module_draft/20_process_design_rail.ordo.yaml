process_rail:
  rail_id: ORDO_APPLIED_PROJECT_FACTORY_RAIL
  purpose: 'Створити прикладний Ordo-проєкт будь-якого типу через guided dialogue. Factory підтримує три режими authoring:
    доменна модель + дерево рішень, ручне дерево рішень, та вільний діалог із подальшим draft-tree review. AI приховує YAML
    від PM/аналітика і видає перший output як source/program.ordo.yaml після погодження blueprint. M61.5 стабілізує free-dialogue
    гілку як self-hosted authoring loop: raw notes → structured extraction → draft tree → node-by-node review → reusable stabilized
    branch. APF v0.1.0-alpha.8 додає user-facing node descriptions, human-readable extraction summaries, on-request-only SVG
    generation, and a confirmed process-feedback loop: feedback → proposed process change → user approval → YAML update/reload
    → continue from the updated flow. APF v0.1.0-alpha.10 adds strict node-by-node user-facing review: each current-node block
    must show human description, question/action, transitions, state, gates, artifacts/templates, and open/deferred branches;
    the runtime must track confirmed path, current branch, unreviewed sibling branches, and deferred return points. APF v0.1.0-alpha.11
    adds incremental YAML patch discipline: after each confirmed tree step, runtime writes only a scoped YAML patch when needed
    and runs a minimal YAML/lint/compile check; full CLI validation is deferred to terminal branch gates, before project generation/handoff,
    or when consistency findings require it. APF v0.1.0-alpha.11 adds decision/control gate discipline: when a current node
    has explicit transition options, runtime must ask the user to choose an allowed action instead of asking only for generic
    confirmation; node approval/correction/deferment is represented as a reusable control gate. APF v0.1.0-alpha.13 adds a
    process-design review rendering contract: when reviewing or designing the process tree, the runtime must explicitly show
    whether it is in tree traversal, branch selection, node-review decision, or execution/validation gate mode; each current-node
    block must include state, gates, artifacts, pending sibling/deferred branches, and a mode-labeled decision prompt. APF
    v0.1.0-alpha.14 commits the fourth startup mode: existing-process improvement. This branch accepts only a full workspace/dev
    package archive or a self-contained source/program.ordo.yaml as baseline, supports batch improvement lists and targeted
    dialogue improvements, reviews before/after changes, builds a confirmed change set, applies scoped YAML patches, runs
    minimal validation, then joins the existing shared full-validation/handoff pipeline without duplicating it. APF v0.1.0-alpha.16
    closes branch 1 human review: runtime_entry_point is moved after domain/input/output/open-question intake; input artifacts
    are policy-based and optional; output artifacts are separated from templates; terminal points bind outputs and verify
    templates with mock-filled examples; static tree blueprint is replaced with progressive tree authoring and explicit terminal-or-continue
    decisions. APF v0.1.0-alpha.16 closes the free-dialogue branch consistency delta after alpha.15: structured extraction
    must preserve candidate output artifacts, template hints, output-related open questions, and unknown/deferred/no-output
    policies; terminal points from free-dialogue draft review use the shared terminal output binding + template/mock-example
    verification loop and join the shared full-validation/handoff tail without duplication. APF v0.1.0-alpha.17 closes the
    manual-tree branch as an entry adapter: user-supplied manual trees in human formats are captured as manual_tree_input,
    normalized into normalized_tree_draft, checked for completeness, then joined into the already-confirmed branch-1 shared
    path at N_DRAFT_SUBTREE_REVIEW_START when structurally sufficient or N_DRAFT_SUBTREE_GENERATION when partial/sketch-like;
    downstream review, terminal output binding, template/mock-example verification, YAML approval, and full validation/handoff
    remain shared and non-duplicated. APF v0.1.0-alpha.18 closes the shared terminal output/template subflow as a reusable
    block across all startup branches: terminal points explicitly choose an output policy; new artifacts are described by
    free-form artifact intent rather than fixed type lists; the runtime shows available terminal state fields, derives an
    output recipe with direct-insert vs generated sections, and uses file-first review packages for document-like artifacts.
    Template/mock/mapping review is simplified to four user decisions: confirm, revise, defer, or remove artifact. Deferred
    templates are recorded as unfinished and cannot be used by final gates until completed or removed. APF v0.1.0-alpha.19
    closes the shared validation/handoff tail as the reusable final path for all startup branches and shared subflows: source
    YAML generation approval, minimal validation, full-validation decision, validation result review, scoped correction loop,
    final unfinished-items gate, handoff package generation, and final handoff. Validation failure UX is simplified: failed
    checks show a short issue list and route either into correction mode or a blocked/deferred state; details live inside
    correction mode. Skipped full validation for alpha is recorded as a limitation, never as passed. Handoff package generation
    is file-first and blocked by failed minimal validation or active unfinished artifacts/templates. APF v0.1.0-alpha.20 closes
    the whole-tree integration review after the branch and shared-tail closures: all four startup branches join the shared
    output/template subflow and shared validation/handoff tail; terminal/deferred/unfinished gates are aligned; legacy unreachable
    nodes are explicitly marked as deprecated compatibility nodes rather than active orphans; structural scan results are
    recorded in the alpha.20 validation report.'
  state_tracking: required
  allow_deviation: true
  require_resume_after_deviation: true
  backtracking: enabled
conversation_semantics:
  on_unmatched_input:
    strategy: classify_and_route
    allowed_classes:
    - answer_current_question
    - answer_future_question
    - correction_previous_answer
    - clarification_request
    - domain_context
    - design_suggestion_request
    - approval
    - refusal
    - out_of_scope
    - what_next_signal
    - draft_tree_review_correction
    - node_confirmation
    - terminal_output_confirmation
    - raw_free_dialogue_note
    - structured_note_extraction
    - draft_tree_request
    - self_hosted_branch_reuse
    - process_feedback
    - process_change_confirmation
    - user_facing_summary_correction
    - svg_requested_explicitly
    - node_correction
    - node_deferment
    - node_review_decision
    - process_design_review_rendering_feedback
    - runtime_context_shift_correction
    require_state_validation: true
nodes:
- id: N_MANUAL_TREE_PROJECT_GOAL
  question: 'Ручний режим: коротко назвіть мету проєкту й тип процесу, без доменного пояснення.'
  answer_type: free_text
  on_answer:
    update_state:
      applied_project_goal: $answer.goal
      applied_process_type: $answer.process_type
      manual_tree_authoring_notes: $answer
    next: N_MANUAL_TREE_RUNTIME_CONTEXT
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_goal_and_process_type_only
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: manual tree project goal remains unclear
- id: N_MANUAL_TREE_RUNTIME_CONTEXT
  question: 'Ручний режим: хто runtime-користувач, яка роль AI, і з якого input починається сесія?'
  answer_type: free_text
  on_answer:
    update_state:
      runtime_human_role: $answer.human_role
      runtime_ai_role: $answer.ai_role
      runtime_entry_point: $answer.entry_point
    next: N_MANUAL_TREE_ROOT_NODE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_human_ai_entry_point
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: manual tree runtime context remains unclear
- id: N_MANUAL_TREE_ROOT_NODE
  question: 'Ручний режим: надайте дерево рішень у будь-якому людському форматі — root node, список гілок, if/then логіку,
    numbered outline, таблицю рішень, Mermaid-like sketch, псевдокод або фрагмент subtree. YAML не потрібен.'
  answer_type: free_text_or_structured_list
  on_answer:
    update_state:
      manual_tree_input: $answer
      manual_tree_input_format: $answer.detected_format
      manual_tree_authoring_notes: $answer
      draft_tree_review_status: manual_tree_captured_not_approved
      manual_tree_branch_2_adapter_status: captured
    next: N_MANUAL_TREE_NORMALIZATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_any_manual_tree_shape_root_branches_if_then_table_mermaid_or_sketch
    max_attempts: 2
    on_exhausted:
      action: continue_with_partial_manual_tree_input
      reason: manual tree may be partial but can still be normalized into a draft
  description: Branch 2 capture node. Manual input is not approved_decision_tree; it is only raw/manual_tree_input that must
    be normalized and joined into the shared progressive review path.
- id: N_MANUAL_TREE_NORMALIZATION
  question: 'AI нормалізує manual_tree_input у normalized_tree_draft: node aliases, labels, branch labels, branch conditions,
    terminal candidates, missing branches, ambiguous transitions, implied gates, possible outputs і open questions. Показати
    normalized draft для review.'
  answer_type: structured_list
  on_answer:
    update_state:
      normalized_tree_draft: $answer.normalized_tree_draft
      decision_tree_blueprint: $answer.normalized_tree_draft
      manual_tree_normalization_status: normalized_pending_completeness_check
      manual_tree_input_completeness: $answer.completeness
      manual_tree_missing_items: $answer.missing_items
      manual_tree_implied_outputs: $answer.implied_outputs
      manual_tree_ambiguous_transitions: $answer.ambiguous_transitions
      candidate_output_artifact_catalog: $answer.implied_outputs
      candidate_gates: $answer.implied_gates
      candidate_open_questions: $answer.open_questions
    next: N_MANUAL_TREE_COMPLETENESS_AND_JOIN
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_normalized_tree_draft_and_ask_for_confirm_or_correction
    max_attempts: 2
    on_exhausted:
      action: continue_with_normalized_tree_draft_as_unapproved_draft
      reason: manual tree normalization can proceed as draft but not as approved tree
  description: Normalizes user-supplied manual tree into an internal draft. This node never approves the tree; it only prepares
    the join into shared review.
- id: N_MANUAL_TREE_COMPLETENESS_AND_JOIN
  question: 'Перевірте повноту normalized_tree_draft: це повне дерево, часткове дерево, root+branches, subtree або sketch?
    Оберіть join point: достатньо структуроване дерево → standard subtree review; часткове/sketch → draft subtree generation.'
  answer_type: enum
  allowed_answers:
  - structured_enough_join_review
  - partial_or_sketch_join_generation
  - needs_manual_tree_correction
  answer_options:
    structured_enough_join_review: Дерево достатньо структуроване → перейти до draft_subtree_review_start
    partial_or_sketch_join_generation: Дерево часткове/sketch → AI добудовує draft subtree
    needs_manual_tree_correction: Повернутися до введення/корекції ручного дерева
  on_answer:
    structured_enough_join_review:
      label: manual tree joins shared review path
      update_state:
        manual_tree_join_point: N_DRAFT_SUBTREE_REVIEW_START
        manual_tree_branch_2_adapter_status: joined_shared_review_path
        manual_tree_downstream_path_source: branch_1_confirmed_progressive_review_path
        draft_subtree_status: generated_pending_review
        draft_nodes: $answer.normalized_tree_draft.nodes
        draft_branches: $answer.normalized_tree_draft.branches
        terminal_candidates: $answer.normalized_tree_draft.terminal_candidates
        terminal_output_binding_points: $answer.normalized_tree_draft.output_binding_candidates
      next: N_DRAFT_SUBTREE_REVIEW_START
    partial_or_sketch_join_generation:
      label: manual tree joins shared draft generation path
      update_state:
        manual_tree_join_point: N_DRAFT_SUBTREE_GENERATION
        manual_tree_branch_2_adapter_status: joined_shared_generation_path
        manual_tree_downstream_path_source: branch_1_confirmed_progressive_review_path
        user_tree_vision_depth: manual_partial_or_sketch
        draft_subtree_candidate: $answer.normalized_tree_draft
      next: N_DRAFT_SUBTREE_GENERATION
    needs_manual_tree_correction:
      label: correct manual tree input before join
      update_state:
        manual_tree_branch_2_adapter_status: needs_manual_input_correction
        manual_tree_missing_items: $answer.missing_items
        manual_tree_ambiguous_transitions: $answer.ambiguous_transitions
      next: N_MANUAL_TREE_ROOT_NODE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_if_manual_tree_is_structured_enough_or_needs_ai_draft_completion
    max_attempts: 2
    on_exhausted:
      action: continue_with_partial_or_sketch_join_generation
      reason: when unsure, route manual tree sketches through draft subtree generation before review
  description: Branch 2 join adapter. Complete/structured manual trees join N_DRAFT_SUBTREE_REVIEW_START; partial trees or
    sketches join N_DRAFT_SUBTREE_GENERATION. All downstream mechanics are reused from branch 1.
- id: N_FREE_DIALOGUE_INTAKE
  question: 'Вільний діалог: розповідайте потреби, ідеї, приклади, бажані outputs або проблеми без структурування дерева.
    AI накопичує raw notes і не вимагає YAML чи готової схеми.'
  answer_type: free_text
  on_answer:
    update_state:
      free_dialogue_notes: $answer
      free_dialogue_raw_notes: $answer
    next: N_FREE_DIALOGUE_STRUCTURED_EXTRACTION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: encourage_plain_language_needs_examples_outputs
    max_attempts: 2
    on_exhausted:
      action: continue_collecting_notes
      reason: free dialogue remains broad but usable
  description: Цей вузол дозволяє користувачу просто розповідати ідеї, потреби й приклади без вимоги знати YAML або будувати
    дерево рішень.
- id: N_FREE_DIALOGUE_STRUCTURED_EXTRACTION
  question: 'AI показує людське резюме вільного діалогу: що ми почули, яке дерево починає вимальовуватись, які candidate nodes/gates/outputs/templates
    зʼявились, які outputs неясні або deferred, і які питання лишаються відкритими.'
  answer_type: plain_language_structured_review
  on_answer:
    update_state:
      free_dialogue_structured_notes: $answer
      extracted_domain_hints: $answer.domain_hints
      candidate_decision_nodes: $answer.candidate_nodes
      candidate_gates: $answer.candidate_gates
      candidate_outputs: $answer.candidate_outputs
      candidate_templates: $answer.candidate_templates
      candidate_open_questions: $answer.open_questions
      open_questions: $answer.open_questions
      self_hosted_authoring_loop_status: free_dialogue_notes_structured
      user_facing_extraction_policy:
        format: plain_language_sections
        confirmed_by_user: true
        technical_projection_internal: true
        avoid_yaml_style_alias_dump: true
      candidate_output_artifact_catalog: $answer.candidate_outputs
      candidate_template_hints: $answer.candidate_templates
      output_related_open_questions: $answer.output_related_open_questions
      free_dialogue_candidate_output_policy:
        outputs_may_be_known: true
        outputs_may_be_partial: true
        outputs_may_be_ai_proposed: true
        outputs_may_be_deferred: true
        outputs_may_be_absent: true
        extract_output_mentions_from_raw_notes: true
      free_dialogue_branch_3_consistency_status: candidate_outputs_extracted
    next: N_FREE_DIALOGUE_ACCUMULATION_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_plain_language_extraction_summary_and_ask_for_corrections_not_yaml_alias_dump
    max_attempts: 2
    on_exhausted:
      action: continue_with_explicit_open_questions
      reason: free dialogue notes extraction remains partial
  description: Free-dialogue extraction must preserve not only candidate nodes and gates, but also candidate output artifacts,
    candidate template hints, output-related open questions, and explicit known/partial/AI-proposed/deferred/no-output policy.
    Technical aliases remain internal; the user sees a plain-language summary.
- id: N_FREE_DIALOGUE_ACCUMULATION_CHECK
  question: Чи достатньо вже накопиченого матеріалу, щоб чекати сигнал “що далі / сформулюй”, або треба ще продовжити вільний
    діалог?
  answer_type: enum
  allowed_answers:
  - continue_collecting
  - ready_for_what_next_signal
  answer_options:
    continue_collecting: Ще збираємо raw notes
    ready_for_what_next_signal: Матеріалу достатньо, чекаємо або приймаємо сигнал “що далі”
  on_answer:
    continue_collecting:
      label: ще нотатки
      update_state:
        self_hosted_authoring_loop_status: collect_more_free_dialogue
      next: N_FREE_DIALOGUE_INTAKE
    ready_for_what_next_signal:
      label: готово до “що далі”
      update_state:
        self_hosted_authoring_loop_status: ready_for_draft_trigger
      next: N_FREE_DIALOGUE_NEXT_SIGNAL
  on_unmatched_input:
    action: CLASSIFY.INTENT
    strategy: if_user_keeps_describing_route_to_intake_if_user_asks_next_route_to_signal
    max_attempts: 2
    on_exhausted:
      action: continue_collecting_notes
      reason: free dialogue accumulation readiness unclear
  description: 'Цей вузол перевіряє, чи вже досить матеріалу для першого draft дерева. Достатність матеріалу не вимагає фінальних
    outputs/templates: вони можуть бути candidate, AI-proposed або deferred, але output-related notes не мають губитися.'
- id: N_FREE_DIALOGUE_NEXT_SIGNAL
  question: Користувач питає “що далі / що у нас виходить / давай сформулюємо” або явно просить draft. AI має запропонувати
    перший draft дерева, а не питати користувача з нуля.
  answer_type: enum
  allowed_answers:
  - keep_talking
  - formulate_draft_tree
  answer_options:
    keep_talking: Продовжити вільний діалог
    formulate_draft_tree: Сформувати перший draft дерева
  on_answer:
    keep_talking:
      label: продовжити діалог
      update_state:
        free_dialogue_readiness_signal: keep_talking
      next: N_FREE_DIALOGUE_INTAKE
    formulate_draft_tree:
      label: а що далі / сформулюй
      update_state:
        free_dialogue_readiness_signal: formulate_draft_tree
        self_hosted_authoring_loop_status: draft_requested_from_free_dialogue
      next: N_FREE_DIALOGUE_DRAFT_TREE_SUMMARY
  on_unmatched_input:
    action: CLASSIFY.INTENT
    strategy: if_user_asks_what_next_then_route_to_formulate_draft_tree
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: free dialogue next signal unclear
  description: Цей вузол ловить момент, коли користувач питає “що далі?” або “давай сформулюємо”, і переводить процес до першого
    draft дерева.
- id: N_FREE_DIALOGUE_DRAFT_TREE_SUMMARY
  question: 'AI показує перший draft дерева з structured notes: вузли, гілки, state, gates, terminal candidates, candidate
    output artifacts, template hints, output-related open questions і місця майбутнього terminal output binding. Підтвердіть
    старт standard node/branch review.'
  answer_type: free_text
  on_answer:
    update_state:
      draft_tree_prototype: $answer
      draft_tree_review_status: draft_ready_for_review
      free_dialogue_draft_tree_ready: true
      self_hosted_authoring_loop_status: draft_tree_ready_for_node_review
      terminal_output_binding_points: $answer.terminal_output_binding_points
      terminal_output_bindings: $answer.terminal_output_bindings
      free_dialogue_terminal_output_binding_policy:
        terminal_points_use_shared_binding_loop: true
        selected_outputs_require_template_or_creation_loop: true
        mock_filled_examples_required: true
        no_output_and_deferred_are_explicit_statuses: true
      free_dialogue_branch_3_consistency_status: draft_tree_routes_to_shared_terminal_output_binding
    next: N_TREE_NODE_REVIEW_DISPLAY_CONTRACT
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_start_draft_tree_review
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: draft tree review not confirmed
  description: Free-dialogue draft tree is not final approval. After node/branch review, every terminal point uses the shared
    Terminal output binding + template verification loop, including mock-filled examples, before tree consolidation and source
    YAML approval.
- id: N_TREE_NODE_REVIEW_DISPLAY_CONTRACT
  description: Перед покроковим узгодженням дерева модель погоджує з користувачем, як саме буде виглядати показ кожного вузла.
    Це захищає від технічного alias-first review і від прихованих state/gates/artifacts. For free-dialogue drafts, current-node
    review must also preserve candidate outputs/templates and route terminal points to the shared output binding loop.
  question: 'Підтвердіть формат review кожного вузла: показуємо людський опис, питання/дію, варіанти переходів, state, gates,
    artifacts/outputs/templates, open questions і deferred sibling-гілки. Технічні alias лишаються вторинними.'
  answer_type: enum
  allowed_answers:
  - confirm_review_format
  - adjust_review_format
  on_answer:
    confirm_review_format:
      label: підтвердити формат показу вузла
      update_state:
        node_review_display_contract:
          show_human_description: true
          show_question_or_action: true
          show_transition_options: true
          show_state_updates: true
          show_gates: true
          show_artifacts_outputs_templates: true
          show_open_questions_and_deferred_branches: true
          hide_technical_aliases_by_default: true
          details_expandable_on_request: true
          show_control_action_bookkeeping: true
          show_not_selected_control_actions: true
          show_blocked_until_ready_actions: true
        node_review_display_policy_status: confirmed
        node_review_ordo_layer_visibility: short_always_detailed_on_request
      next: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
    adjust_review_format:
      label: уточнити формат показу вузла
      update_state:
        node_review_display_contract: $answer
        node_review_display_policy_status: custom_confirmed
      next: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_whether_state_gates_artifacts_should_be_short_or_detailed
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: node review display contract remains unclear
- id: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  description: 'Цей вузол фіксує економний режим зміни YAML під час обходу дерева: після підтвердженого кроку вносимо тільки
    малий scoped patch, якщо він потрібен, і запускаємо мінімальну перевірку. Повна перевірка не виконується після кожного
    вузла.'
  question: 'Підтвердіть режим роботи під час обходу дерева: після кожного підтвердженого кроку, якщо YAML треба змінити,
    робимо малий YAML patch і мінімальну перевірку; повний CLI validation запускаємо тільки на terminal/pre-handoff gate або
    якщо мінімальна перевірка знаходить проблему.'
  answer_type: enum
  allowed_answers:
  - confirm_incremental_yaml_patch_policy
  - adjust_incremental_yaml_patch_policy
  answer_options:
    confirm_incremental_yaml_patch_policy: підтвердити incremental YAML patch + minimal check
    adjust_incremental_yaml_patch_policy: уточнити validation profile
  on_answer:
    confirm_incremental_yaml_patch_policy:
      label: incremental YAML patch policy confirmed
      update_state:
        incremental_yaml_update_policy:
          enabled: true
          when: after_each_confirmed_tree_step_if_yaml_change_is_needed
          write_mode: small_scoped_patch
          avoid_full_regeneration_on_each_node: true
        incremental_yaml_validation_profile:
          name: minimal_yaml_patch_check
          checks:
          - yaml_parse
          - cli_lint
          - cli_compile_refresh_ir
          full_validation_deferred_until:
          - terminal_branch
          - before_project_generation_or_handoff
        incremental_yaml_validation_status: confirmed_profile
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    adjust_incremental_yaml_patch_policy:
      label: custom incremental validation policy
      update_state:
        incremental_yaml_update_policy: $answer.policy
        incremental_yaml_validation_profile: $answer.validation_profile
        incremental_yaml_validation_status: custom_confirmed
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_minimal_patch_vs_full_validation_cadence
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: incremental YAML validation policy unclear
- id: N_TREE_DEPTH_FIRST_REVIEW_LOOP
  question: 'Покажіть рівно один поточний вузол дерева для review у process-design rendering форматі: спочатку явно назвіть
    runtime mode/context shift (tree traversal, branch selection, node-review decision або execution gate), потім покажіть
    людський опис, питання/дію, варіанти переходів або control-дії, що запамʼятовується в state, які gates перевіряються,
    які artifacts/outputs/templates повʼязані, які open questions або sibling-гілки лишаються. Після показу вузла НЕ питати
    generic “підтверджуєш?”; перейти до control gate, де користувач обирає одну з дій: підтвердити, виправити або відкласти.
    Також покажіть control-action bookkeeping: selected_control_action, not_selected_control_actions і blocked_until_ready_actions
    окремо від unreviewed_sibling_branches/deferred_return_points.'
  answer_type: structured_list
  on_answer:
    update_state:
      current_tree_review_node: $answer.node
      approved_decision_tree: $answer.tree_snapshot
      tree_review_depth_first_complete: $answer.depth_first_complete
      draft_tree_review_status: in_review
      self_hosted_authoring_loop_status: node_review_in_progress
      confirmed_review_path: $answer.confirmed_path
      current_review_branch: $answer.current_branch
      unreviewed_sibling_branches: $answer.unreviewed_sibling_branches
      deferred_return_points: $answer.deferred_return_points
      current_node_review_record: $answer.current_node_review_record
      node_review_ordo_layer_visibility: short_always_detailed_on_request
      selected_control_action: $answer.selected_control_action
      not_selected_control_actions: $answer.not_selected_control_actions
      blocked_until_ready_actions: $answer.blocked_until_ready_actions
      current_process_layer_label: $answer.current_process_layer_label
      runtime_context_shift_notice: $answer.runtime_context_shift_notice
      current_node_display_block: $answer.current_node_display_block
    next: N_CURRENT_NODE_REVIEW_DECISION_GATE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_or_correct_current_node
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: current tree node review incomplete
  description: 'Поточний вузол review показується користувачу в user-facing process-design rendering форматі з явним mode
    label/context shift: tree traversal, branch selection, node-review decision або execution/validation gate. Runtime view
    must show state, gates, artifacts, pending sibling/deferred branches, and must not mix real unreviewed sibling branches
    with not-selected control actions.'
- id: N_CURRENT_NODE_REVIEW_DECISION_GATE
  description: 'Control/review gate для поточного вузла. Це не змістовий вузол дерева, який треба “підтвердити як частину
    дерева”, а runtime-рішення користувача щодо вже показаного вузла. Before asking, runtime must explicitly say: “Зараз це
    review-рішення по показаному вузлу, не вибір гілки дерева.” Після вибору action runtime фіксує selected_control_action
    і not_selected_control_actions; ці not-selected actions не додаються до deferred return points.'
  question: Що робимо з поточним показаним вузлом?
  answer_type: enum
  allowed_answers:
  - approve_current_node
  - correct_current_node
  - defer_current_node
  answer_options:
    approve_current_node: Підтвердити поточний вузол як є
    correct_current_node: Виправити поточний вузол і показати оновлену версію
    defer_current_node: Відкласти поточний вузол / винести в open questions або deferred return points
  on_answer:
    approve_current_node:
      label: вузол підтверджено
      update_state:
        current_node_review_decision: approved
        current_node_review_record.status: approved
        node_review_control_gate_status: passed
        confirmed_review_path: $answer.confirmed_path
        last_incremental_yaml_patch_summary: node approved; yaml patch only if current node definition changed
        selected_control_action: approve_current_node
        not_selected_control_actions:
        - correct_current_node
        - defer_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=approve_current_node;not_selected=correct_current_node,defer_current_node
        runtime_context_shift_notice: node_review_decision_completed_return_to_tree_traversal
      next: N_BRANCH_REVIEW
    correct_current_node:
      label: вузол потребує правки
      update_state:
        current_node_review_decision: needs_correction
        current_node_review_record.status: needs_correction
        corrected_review_nodes: $answer.corrections
        draft_tree_review_status: node_correction_in_progress
        node_review_control_gate_status: correction_requested
        last_incremental_yaml_patch_summary: correction requested; apply scoped YAML patch after corrected node is accepted
        selected_control_action: correct_current_node
        not_selected_control_actions:
        - approve_current_node
        - defer_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=correct_current_node;not_selected=approve_current_node,defer_current_node
        runtime_context_shift_notice: node_review_decision_requests_correction
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    defer_current_node:
      label: вузол відкладено
      update_state:
        current_node_review_decision: deferred
        current_node_review_record.status: deferred
        deferred_review_nodes: $answer.deferred_nodes
        deferred_return_points: $answer.deferred_return_points
        open_questions: $answer.open_questions
        node_review_control_gate_status: deferred
        last_incremental_yaml_patch_summary: node deferred; update deferred return points/open questions only
        selected_control_action: defer_current_node
        not_selected_control_actions:
        - approve_current_node
        - correct_current_node
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=defer_current_node;not_selected=approve_current_node,correct_current_node
        runtime_context_shift_notice: node_review_decision_deferred_return_point_recorded
      next: N_SUBTREE_REVIEW_COMPLETION_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_three_node_decision_options_approve_correct_defer
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: current node review decision unclear
- id: N_TREE_REVIEW_CONTINUE_OR_APPROVE
  question: Продовжити review наступної гілки/вузла чи затвердити дерево рішень?
  answer_type: enum
  allowed_answers:
  - continue_depth_first
  - approve_tree
  answer_options:
    continue_depth_first: Продовжити depth-first review
    approve_tree: Затвердити дерево
  on_answer:
    continue_depth_first:
      label: наступний вузол
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
      update_state:
        selected_control_action: continue_depth_first
        not_selected_control_actions:
        - approve_tree
        blocked_until_ready_actions:
        - action: approve_tree
          blocked_until: all_required_branches_reviewed
          reason: unreviewed_sibling_branches_or_deferred_return_points_may_remain
        control_action_decision_log: $append:selected=continue_depth_first;not_selected=approve_tree;blocked=approve_tree_until_all_required_branches_reviewed
        current_process_layer_label: tree_traversal
    approve_tree:
      label: дерево затверджено
      update_state:
        draft_tree_review_status: approved
        tree_review_depth_first_complete: true
        self_hosted_authoring_loop_status: decision_tree_approved
        selected_control_action: approve_tree
        not_selected_control_actions:
        - continue_depth_first
        blocked_until_ready_actions: []
        control_action_decision_log: $append:selected=approve_tree;not_selected=continue_depth_first
        current_process_layer_label: tree_traversal
      next: N_STABILIZED_TREE_BRANCH_HANDOFF
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_continue_or_approve_tree
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: tree review continuation unclear
  description: 'Цей вузол вирішує, чи йдемо до наступного вузла дерева, чи все дерево вже пройдено й може бути затверджене.
    approve_tree can be blocked/deferred while unreviewed sibling branches or deferred return points remain. Runtime must
    label this as tree traversal / branch-selection level, not node-review correction. Alpha.15 note: for progressive tree
    authoring, subtree completion should use N_SUBTREE_REVIEW_COMPLETION_CHECK and N_APPROVED_TREE_CONSOLIDATION; this node
    remains for legacy/free-dialogue compatibility. Alpha.20 integration note: deprecated legacy compatibility node; not counted
    as unresolved orphan in active whole-tree runtime path.'
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Superseded by subtree review completion and approved tree consolidation.
- id: N_STABILIZED_TREE_BRANCH_HANDOFF
  question: 'Зафіксуйте стабілізовану гілку authoring: який branch/subflow уже затверджений, як він буде використовуватись
    як алгоритм для наступних гілок, і чи можна вмикати self-hosted reuse.'
  answer_type: structured_list
  on_answer:
    update_state:
      stabilized_tree_branch: $answer.branch_id
      self_hosted_reuse_enabled: $answer.reuse_enabled
      self_hosted_authoring_loop_status: stabilized_branch_reusable
    next: N_SHARED_TAIL_FULL_VALIDATION_DECISION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_which_branch_is_stabilized_and_how_to_reuse_it
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: stabilized authoring branch handoff unclear
  description: 'Цей вузол фіксує стабілізовану гілку як алгоритм, яким можна користуватись далі для побудови інших частин
    factory. Alpha.20 integration note: deprecated legacy compatibility node; not counted as unresolved orphan in active whole-tree
    runtime path.'
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Superseded by approved tree consolidation and shared validation/handoff tail.
- id: N_TERMINAL_BRANCH_FULL_VALIDATION_GATE
  description: 'Compatibility join point retained for older references. New APF runtime uses the explicit shared validation/handoff
    tail nodes introduced in alpha.19. Alpha.20 integration note: deprecated legacy compatibility node; not counted as unresolved
    orphan in active whole-tree runtime path.'
  question: Continue into the shared validation/handoff tail.
  answer_type: enum
  allowed_answers:
  - continue_to_shared_validation_tail
  answer_options:
    continue_to_shared_validation_tail: Перейти до shared validation / handoff tail
  on_answer:
    continue_to_shared_validation_tail:
      label: join shared validation tail
      update_state:
        shared_validation_handoff_tail_join_status: joined
      next: N_SHARED_TAIL_FULL_VALIDATION_DECISION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_to_continue_to_shared_validation_tail
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: shared validation tail join unclear
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Compatibility join point retained for older references; active flow uses explicit shared validation/handoff
    tail.
- id: N_LANGUAGE_IMPROVEMENT_PROPOSALS_REVIEW
  question: Чи виникли під час authoring речі, яких мові бракує або які поки існують як provisional metadata? Зафіксуйте proposal
    або підтвердіть, що нових пропозицій немає.
  answer_type: structured_list
  on_answer:
    update_state:
      language_improvement_proposals: $answer.proposals
      language_improvement_proposals_status: $answer.status
    next: N_MODULE_VERSIONING_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_missing_language_construct_or_none_detected
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: language improvement proposal status is unclear
  description: 'Цей вузол збирає пропозиції щодо покращення мови, якщо під час роботи зʼявляються речі, яких мова ще офіційно
    не підтримує. Alpha.20 integration note: deprecated legacy compatibility node; not counted as unresolved orphan in active
    whole-tree runtime path.'
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Retained as historical improvement-capture note; language proposals are tracked in a separate context
    package.
- id: N_WORKING_CONTEXT_GRAPH_POLICY
  question: 'Підтвердіть стандарт візуалізації: під час звичайної покрокової роботи SVG не генерується автоматично. Якщо користувач
    прямо просить картинку, тоді генерується context-view: шлях від root до поточного вузла плюс піддерево нижче нього.'
  answer_type: enum
  allowed_answers:
  - confirm_on_request_context_svg_policy
  - adjust_policy
  on_answer:
    confirm_on_request_context_svg_policy:
      label: SVG on request only; context when requested
      update_state:
        focused_svg_policy:
          default_mode: context
          show: root_to_current_node_plus_current_subtree
          full_tree_policy: overview_only
          subtree_policy: downstream_debug_only
          path_policy: navigation_only
          generation_policy: only_when_user_explicitly_requests_svg
        auto_svg_generation_policy:
          default: 'off'
          generate_only_when_user_explicitly_requests: true
          when_requested_use: context_view_by_default
        current_graph_rendering_mode: context
        graph_rendering_policy_status: confirmed
      next: N_LANGUAGE_IMPROVEMENT_PROPOSALS_REVIEW
    adjust_policy:
      label: уточнити policy
      update_state:
        focused_svg_policy: $answer
        graph_rendering_policy_status: custom_confirmed
      next: N_LANGUAGE_IMPROVEMENT_PROPOSALS_REVIEW
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_context_svg_vs_full_tree
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: graph rendering policy is not confirmed
  description: 'Цей вузол визначає, коли показувати SVG: за замовчуванням не генеруємо картинку, а робимо її тільки на пряме
    прохання користувача. Alpha.20 integration note: deprecated legacy compatibility node; not counted as unresolved orphan
    in active whole-tree runtime path.'
  answer_options:
    confirm_on_request_context_svg_policy: SVG тільки на пряме прохання; тоді context-view
    adjust_policy: уточнити policy
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Retained as historical graph display policy; not an active startup branch node.
- id: N_PROCESS_FEEDBACK_CHANGE_CONFIRMATION
  description: 'Цей вузол спрацьовує, коли користувач коментує сам процес. AI приймає зауваження, показує як зміниться крок,
    чекає підтвердження, вносить малий YAML patch, запускає мінімальну перевірку і продовжує вже з нової версії. Повна перевірка
    не виконується після кожної дрібної правки. Alpha.20 integration note: deprecated legacy compatibility node; not counted
    as unresolved orphan in active whole-tree runtime path.'
  question: Користувач дав зауваження до самого процесу. AI приймає зауваження, показує нову форму кроку людською мовою, після
    підтвердження оновлює YAML малим patch, запускає мінімальну перевірку YAML/lint/compile і продовжує з поточного місця.
    Full validation відкладається до terminal/pre-handoff gate.
  answer_type: structured_list
  allowed_answers:
  - approve_process_change
  - revise_process_change
  answer_options:
    approve_process_change: прийняти зміну процесу й оновити YAML
    revise_process_change: уточнити зміну перед оновленням YAML
  on_answer:
    update_state:
      process_feedback_policy_status: confirmed
      process_feedback_items: $answer.feedback_items
      pending_process_change: $answer.process_change
      yaml_reload_after_process_change: true
    next: N_INCREMENTAL_YAML_PATCH_VALIDATION_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_user_to_confirm_or_revise_process_change
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: process change confirmation unclear
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
  deprecation_reason: Retained as process-change policy note; active correction mode is now shared validation/handoff correction
    loop.
- id: N_EXISTING_PROCESS_IMPROVEMENT_ENTRY
  description: Вхід у четвертий режим. Вузол відрізняє коригування наявного процесу від реконструкції або створення нового
    процесу.
  question: 'Режим 4: коригуємо існуючий процес, а не створюємо новий з нуля. Підтвердьте, що завдання саме у зміні наявного
    Ordo-процесу.'
  answer_type: enum
  allowed_answers:
  - confirm_existing_process_improvement
  - route_to_new_process_creation
  answer_options:
    confirm_existing_process_improvement: Так, коригуємо існуючий процес
    route_to_new_process_creation: Ні, треба створювати процес з нуля
  on_answer:
    confirm_existing_process_improvement:
      label: коригування існуючого процесу підтверджено
      update_state:
        existing_process_improvement_status: confirmed_existing_process
        runtime_context_shift_notice: existing_process_improvement_mode_started
      next: N_EXISTING_PROCESS_BASELINE_DEFINITION
    route_to_new_process_creation:
      label: повернутися до створення нового процесу
      update_state:
        existing_process_improvement_status: rerouted_to_new_process_creation
        factory_authoring_mode: null
      next: N_FACTORY_MODE_SELECTION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_missing_existing_process_improvement_detail
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: N_EXISTING_PROCESS_IMPROVEMENT_ENTRY remains unclear
gates:
- id: G_OUTPUT_ARTIFACT_CATALOG_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.output_artifact_catalog is not empty
  on_fail: block
- id: G_CANDIDATE_OUTPUTS_AND_TEMPLATES_CAPTURED
  method: mechanical
  trust_class: deterministic
  condition: state.candidate_outputs is not empty and state.candidate_templates is not empty
  on_fail: block
- id: G_AUTO_SVG_ON_REQUEST_ONLY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms SVG is not generated automatically during runtime review; context SVG is produced only when explicitly
    requested.
  condition: state.auto_svg_generation_policy.generate_only_when_user_explicitly_requests is true
  on_fail: block
- id: G_USER_FACING_NODE_DESCRIPTIONS_ENABLED
  method: mechanical
  trust_class: deterministic
  description: Confirms every current-node review should include a human-readable node description in the user language.
  condition: state.user_facing_node_description_policy.include_in_current_node_block is true
  on_fail: block
- id: G_USER_FACING_EXTRACTION_SUMMARY_ENABLED
  method: mechanical
  trust_class: deterministic
  description: Confirms free-dialogue extraction is presented as a plain-language summary before any technical projection.
  condition: state.user_facing_extraction_policy.avoid_yaml_style_alias_dump is true
  on_fail: block
- id: G_CONTROL_ACTION_BOOKKEEPING_SEPARATED
  method: mechanical
  trust_class: deterministic
  description: Ensures runtime review separates real unreviewed sibling branches from not-selected or blocked control actions.
  condition: state.control_action_bookkeeping_policy.separate_from_tree_branches is true and state.not_selected_control_actions
    is not null and state.blocked_until_ready_actions is not null
  on_fail: block
- id: G_INCREMENTAL_YAML_PATCH_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms tree review uses small scoped YAML patches and minimal checks after confirmed steps instead of full
    regeneration/validation after every node.
  condition: state.incremental_yaml_update_policy.enabled is true and state.incremental_yaml_validation_profile.name is not
    null
  on_fail: block
- id: G_MINIMAL_YAML_PATCH_CHECK_DEFINED
  method: mechanical
  trust_class: deterministic
  description: Confirms the minimal per-step validation profile is defined as YAML parse plus minimal CLI checks.
  condition: state.minimal_yaml_patch_check_defined is true
  on_fail: block
assertions:
- id: A_PM_DOES_NOT_WRITE_YAML_DIRECTLY
  polarity: must
  condition: ai_translates_pm_answers_to_ordo_source_yaml
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_YAML_HIDDEN_FROM_PM_BY_DEFAULT
  polarity: must
  condition: pm_sees_summary_before_source_yaml_details
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_CONFUSION_TESTS_DEFERRED_FOR_M61_1
  polarity: must
  condition: confusion_tests_are_explicitly_deferred_not_deleted
  phase:
  - runtime
  - test
  severity: warn
  on_fail: WARN
- id: A_LANGUAGE_PACKAGE_VERSION_IS_CONTAINER
  polarity: must
  condition: language_package_version_only_declares_compatibility_and_inclusion_not_module_iteration_number
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_NO_AUTOMATIC_SVG_DURING_TEXT_REVIEW
  polarity: must
  condition: svg_is_generated_only_when_user_explicitly_requests_it
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_CURRENT_NODE_BLOCK_HAS_HUMAN_DESCRIPTION
  polarity: must
  condition: current_node_review_includes_user_language_description_before_technical_aliases
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_EXTRACTION_SUMMARY_IS_USER_FACING
  polarity: must
  condition: structured_extraction_is_presented_as_what_i_heard_what_it_means_emerging_tree_open_questions
  phase:
  - runtime
