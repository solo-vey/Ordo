  on_answer:
    update_state:
      domain_model_notes: $answer
    next: N_INPUT_ARTIFACTS_POLICY
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_domain_who_what_why_entities_constraints
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: domain model remains unclear
