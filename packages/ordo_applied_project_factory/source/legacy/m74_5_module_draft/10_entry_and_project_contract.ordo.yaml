- id: N_DOMAIN_INPUT_OUTPUT_SOURCES
  question: 'Надайте або опишіть наявні input sources і бажані output documents/templates: файли, обʼєкти, записи БД, приклади
    документів або усні шаблони.'
  answer_type: structured_list
  on_answer:
