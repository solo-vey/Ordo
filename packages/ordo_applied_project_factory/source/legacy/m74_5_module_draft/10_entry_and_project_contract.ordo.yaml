- id: N_APPROVAL_TO_GENERATE_SOURCE_YAML
  question: 'Перед генерацією source/program.ordo.yaml підтвердіть pre-generation summary: goal, process type, roles, entry
    point, approved tree, state, gates, terminal outputs, template/mock status і deferred items.'
  answer_type: enum
  allowed_answers:
  - 'yes'
  - 'no'
  on_answer:
    'yes':
