      domain_input_sources: $answer.inputs
      domain_output_template_sources: $answer.outputs
    next: N_OPEN_QUESTIONS_REVIEW
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_separately_for_inputs_and_output_template_hints
    max_attempts: 2
    on_exhausted:
      action: continue_with_explicit_open_questions
      reason: input/output sources incomplete
  lifecycle_status: deprecated_legacy_compatibility
  active_runtime_node: false
