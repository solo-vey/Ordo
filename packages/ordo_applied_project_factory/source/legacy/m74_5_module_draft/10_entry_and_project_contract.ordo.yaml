    whole-tree runtime path.'
- id: N_OPEN_QUESTIONS_REVIEW
  question: 'Зафіксуйте відкриті питання і класифікуйте їх: blocking, deferred, output-related, gate-related, terminal-path-related
    або resolved.'
  answer_type: structured_list
  on_answer:
    update_state:
      open_questions: $answer
      open_question_gate_status: triaged
    next: N_RUNTIME_ENTRY_POINT
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_to_classify_open_questions_or_confirm_none
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: open question gate remains untriaged
  description: Open questions не обовʼязково блокують рух далі; вони мають бути класифіковані й можуть бути привʼязані до
    дерева, gates або terminal output/template review.
gates:
- id: G_FACTORY_AUTHORING_MODE_SELECTED
  method: mechanical
  trust_class: deterministic
  condition: state.factory_authoring_mode is not null
  on_fail: block
- id: G_APPLIED_PROJECT_GOAL_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.applied_project_goal is not null
  on_fail: block
- id: G_APPLIED_PROCESS_TYPE_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.applied_process_type is not null
  on_fail: block
- id: G_RUNTIME_ROLES_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.runtime_human_role is not null and state.runtime_ai_role is not null
  on_fail: block
- id: G_RUNTIME_ENTRY_POINT_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.runtime_entry_point is not null
  on_fail: block
- id: G_STATE_SCHEMA_BLUEPRINT_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.state_schema_blueprint is not empty
  on_fail: block
- id: G_FIRST_RELEASE_SOURCE_YAML_ONLY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.first_release_output_scope is not null
  on_fail: block
- id: G_APPROVAL_TO_GENERATE_SOURCE_YAML
  method: mechanical
  trust_class: deterministic
  condition: state.approval_to_generate_source_yaml is true
  on_fail: block
- id: G_DOMAIN_OPEN_QUESTIONS_TRIAGED
  method: human
  trust_class: human_decision
  condition: open questions are classified as blocking_now, defer_until_tree, defer_until_compile, or defer_to_runtime_project
  on_fail: block
- id: G_MODULE_VERSIONING_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.module_versioning_policy is not null and state.module_versioning_policy_status is not null
  on_fail: block
  description: Confirms Project Factory has its own module-local versioning independent from the parent language package version.
- id: G_SOURCE_YAML_GENERATION_REQUIRES_APPROVAL
  method: mechanical
  trust_class: deterministic
  condition: state.source_yaml_generation_approval == approved or state.approval_to_generate_source_yaml is true
  on_fail: block
  description: source/program.ordo.yaml generation/update requires explicit user approval and visible scope.
assertions:
- id: A_FACTORY_HAS_NO_DOMAIN_LIMIT
  polarity: not
  condition: factory_restricts_applied_project_type_to_document_generating_only
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_FACTORY_STARTS_WITH_THREE_MODES
  polarity: must
  condition: factory_mode_selection_offers_domain_model_manual_tree_and_free_dialogue
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_APPLIED_PROJECT_FACTORY_USES_MODULE_VERSIONING
  polarity: must
  condition: applied_project_factory_version_is_module_local_not_language_package_milestone
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
