intent:
  id: INTENT_APPLIED_PROJECT_FACTORY
  description: 'Допомогти PM/аналітику створити новий прикладний Ordo-проєкт будь-якого типу без написання YAML напряму; AI
    обирає режим, у free-dialogue накопичує raw notes, структурує їх у candidate nodes/gates/outputs/templates, формує draft
    tree, проводить depth-first review і генерує source/program.ordo.yaml. APF v0.1.0-alpha.13 фіксує user-facing формат показу
    процесу під час design/review, щоб режим traversal, branch selection, node review decision і validation gate не змішувалися.
    APF v0.1.0-alpha.14 додає четвертий режим старту — коригування існуючого процесу — з batch та targeted improvement subflows.
    APF v0.1.0-alpha.16 adds progressive branch-1 authoring, input policy, terminal output binding, and template/mock-example
    verification before YAML generation. APF v0.1.0-alpha.17 treats manual-tree authoring as an adapter into the progressive
    review path rather than a separate downstream process. APF v0.1.0-alpha.18 closes the shared terminal output/template
    subflow as a reusable block across all startup branches: terminal points explicitly choose an output policy; new artifacts
    are described by free-form artifact intent rather than fixed type lists; the runtime shows available terminal state fields,
    derives an output recipe with direct-insert vs generated sections, and uses file-first review packages for document-like
    artifacts. Template/mock/mapping review is simplified to four user decisions: confirm, revise, defer, or remove artifact.
    Deferred templates are recorded as unfinished and cannot be used by final gates until completed or removed. APF v0.1.0-alpha.19
    closes the shared validation/handoff tail as the reusable final path for all startup branches and shared subflows: source
    YAML generation approval, minimal validation, full-validation decision, validation result review, scoped correction loop,
    final unfinished-items gate, handoff package generation, and final handoff. Validation failure UX is simplified: failed
    checks show a short issue list and route either into correction mode or a blocked/deferred state; details live inside
    correction mode. Skipped full validation for alpha is recorded as a limitation, never as passed. Handoff package generation
    is file-first and blocked by failed minimal validation or active unfinished artifacts/templates. APF v0.1.0-alpha.20 closes
    the whole-tree integration review after the branch and shared-tail closures: all four startup branches join the shared
    output/template subflow and shared validation/handoff tail; terminal/deferred/unfinished gates are aligned; legacy unreachable
    nodes are explicitly marked as deprecated compatibility nodes rather than active orphans; structural scan results are
    recorded in the alpha.20 validation report.'
  purpose: ' APF v0.1.0-alpha.12 separates unreviewed sibling branches from not-selected control actions and blocked control
    actions; review state must show which alternatives were intentionally not selected and which actions are blocked until
    readiness conditions are met.'
