nodes:
- id: N_TERMINAL_OUTPUT_BINDING_POLICY
  question: 'Підтвердьте policy: кожна terminal point має окремо вибрати outputs, перевірити templates/mock examples або явно
    позначити no-output/deferred output.'
  answer_type: enum
  allowed_answers:
  - confirm_terminal_output_binding_policy
  - adjust_terminal_output_binding_policy
  answer_options:
    confirm_terminal_output_binding_policy: Підтвердити terminal output binding policy
    adjust_terminal_output_binding_policy: Уточнити policy
  on_answer:
    confirm_terminal_output_binding_policy:
      label: terminal output binding + template verification confirmed
      update_state:
        terminal_output_binding_policy:
          candidate_catalog_first: true
          terminal_points_choose_outputs: true
          new_outputs_can_be_added_at_terminal_points: true
          selected_outputs_require_verified_templates_or_accepted_alpha_templates: true
          mock_filled_examples_required_for_review: true
          no_output_and_deferred_output_are_explicit_statuses: true
        template_verification_status: policy_confirmed
      next: N_OPEN_QUESTIONS_REVIEW
    adjust_terminal_output_binding_policy:
      label: custom terminal output binding policy
      update_state:
        terminal_output_binding_policy: $answer
      next: N_OPEN_QUESTIONS_REVIEW
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_terminal_output_binding_with_mock_examples
    max_attempts: 2
    on_exhausted:
      action: continue_with_default_terminal_output_binding_policy
      reason: policy default is safe and explicit
  description: 'Shared policy node: output templates are not a black box. Terminal points bind outputs, verify templates and
    review mock-filled examples before package approval. This shared policy is used by branch 1, branch 2, branch 3 free-dialogue
    draft trees, and branch 4 when outputs/templates are changed.'
- id: N_PROGRESSIVE_TREE_AUTHORING_ENTRY
  question: 'Переходимо до progressive tree authoring: користувач може описати тільки root і перші гілки, глибший subtree,
    повний draft або просто логіку словами.'
  answer_type: enum
  allowed_answers:
  - start_progressive_tree_authoring
  - adjust_tree_authoring_mode
  answer_options:
    start_progressive_tree_authoring: Почати progressive tree authoring
    adjust_tree_authoring_mode: Уточнити режим побудови дерева
  on_answer:
    start_progressive_tree_authoring:
      label: progressive tree authoring
      update_state:
        tree_authoring_mode: progressive
      next: N_USER_TREE_VISION_CAPTURE
    adjust_tree_authoring_mode:
      label: custom tree authoring mode
      update_state:
        tree_authoring_mode: $answer
      next: N_USER_TREE_VISION_CAPTURE
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: explain_shallow_or_deep_tree_vision_options
    max_attempts: 2
    on_exhausted:
      action: continue_with_progressive_tree_authoring
      reason: progressive mode is default
  description: Replaces static decision_tree_blueprint for branch 1. The user does not need to describe the whole tree up
    front.
- id: N_USER_TREE_VISION_CAPTURE
  question: Як ви зараз бачите старт дерева? Можна описати root + перші гілки, одну наступну гілку, subtree на 2–5 рівнів,
    повний draft або free-form logic.
  answer_type: free_text
  on_answer:
    update_state:
      user_tree_vision_depth: $answer.depth
      root_node_candidate: $answer.root_node
      draft_subtree_candidate: $answer.subtree_or_logic
    next: N_DRAFT_SUBTREE_GENERATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_root_node_first_branches_or_free_form_logic
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: no root node or usable tree logic
  description: Captures shallow or deep user tree vision before AI drafts a subtree.
- id: N_DRAFT_SUBTREE_GENERATION
  question: 'AI формує draft-subtree з user tree vision: root/current node, питання/дії, branches, deeper nodes, terminal
    candidates, output binding candidates і risks.'
  answer_type: structured_list
  on_answer:
    update_state:
      draft_subtree_status: generated_pending_review
      draft_nodes: $answer.nodes
      draft_branches: $answer.branches
      terminal_candidates: $answer.terminal_candidates
      terminal_output_binding_points: $answer.output_binding_candidates
      draft_open_questions: $answer.open_questions
    next: N_DRAFT_SUBTREE_REVIEW_START
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_ai_to_show_draft_subtree_card
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: draft subtree was not generated
  description: Draft subtree is not approved tree. It must enter node/branch/terminal verification.
- id: N_DRAFT_SUBTREE_REVIEW_START
  question: 'Починаємо standard verification draft-subtree: current node, branches, terminal/continue decisions, output binding,
    sibling branches and deferred return points.'
  answer_type: enum
  allowed_answers:
  - start_subtree_review
  - revise_draft_subtree_first
  answer_options:
    start_subtree_review: Почати покроковий review
    revise_draft_subtree_first: Спочатку переробити draft-subtree
  on_answer:
    start_subtree_review:
      label: start node-by-node review
      update_state:
        draft_subtree_status: under_review
        current_tree_review_node: $answer.first_node
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    revise_draft_subtree_first:
      label: revise draft subtree
      update_state:
        draft_subtree_status: needs_revision
      next: N_DRAFT_SUBTREE_GENERATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_start_review_or_revise_draft
    max_attempts: 2
    on_exhausted:
      action: continue_with_start_subtree_review
      reason: review is mandatory after draft generation
  description: Turns generated draft subtree into a review queue.
- id: N_BRANCH_REVIEW
  question: 'Перевірте вихідні гілки поточного вузла: label, умова/відповідь, next node або terminal candidate, state updates,
    gates, sibling/deferred status.'
  answer_type: structured_list
  on_answer:
    update_state:
      current_branch_review_status: $answer.status
      confirmed_branches: $answer.confirmed_branches
      unreviewed_sibling_branches: $answer.unreviewed_sibling_branches
      deferred_return_points: $answer.deferred_return_points
    next: N_TERMINAL_OR_CONTINUE_DECISION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_review_outgoing_branches_one_by_one
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: branch review incomplete
  description: A node can be correct while its outgoing branches are wrong; branch review is separate from node review.
- id: N_TERMINAL_OR_CONTINUE_DECISION
  question: Що відбувається далі по цій гілці?
  answer_type: enum
  allowed_answers:
  - terminal_point
  - continue_with_next_branching
  - add_intermediate_node
  - restructure_previous_logic
  - defer_branch
  answer_options:
    terminal_point: Це terminal point — шлях тут завершується
    continue_with_next_branching: Тут є наступне розгалуження
    add_intermediate_node: Треба додати проміжний вузол
    restructure_previous_logic: Треба перебудувати попередню логіку
    defer_branch: Відкласти цю гілку
  on_answer:
    terminal_point:
      label: terminal point
      update_state:
        next_step_decision: terminal_point
        terminal_output_binding_required: true
      next: N_TERMINAL_OUTPUT_BINDING_LOOP
    continue_with_next_branching:
      label: continue with next branching
      update_state:
        next_step_decision: continue_with_next_branching
      next: N_USER_TREE_VISION_CAPTURE
    add_intermediate_node:
      label: add intermediate node
      update_state:
        next_step_decision: add_intermediate_node
        intermediate_node_candidate: $answer
      next: N_DRAFT_SUBTREE_GENERATION
    restructure_previous_logic:
      label: restructure previous logic
      update_state:
        next_step_decision: restructure_previous_logic
        affected_previous_nodes: $answer.affected_nodes
        before_after_subtree_proposal: $answer.before_after
      next: N_DRAFT_SUBTREE_GENERATION
    defer_branch:
      label: defer branch
      update_state:
        next_step_decision: deferred
        deferred_return_points: $answer.deferred_return_points
      next: N_SUBTREE_REVIEW_COMPLETION_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_terminal_continue_intermediate_restructure_defer_options
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: terminal-or-continue decision unclear
  description: 'Core progressive tree decision: each reviewed branch either ends, continues, gets an intermediate node, reopens
    previous logic, or is deferred.'
- id: N_TERMINAL_OUTPUT_BINDING_LOOP
  question: 'Terminal point reached. Define output policy: use existing output, add a new artifact, confirm no output is needed,
    or defer the output decision.'
  answer_type: enum
  allowed_answers:
  - select_outputs_from_catalog
  - add_new_output_artifact
  - no_output_required
  - defer_output_decision
  answer_options:
    select_outputs_from_catalog: Вибрати output із candidate catalog
    add_new_output_artifact: Додати новий artifact/output
    no_output_required: Output не потрібен
    defer_output_decision: Відкласти рішення по output
  user_facing_contract:
    show_terminal_point_summary: true
    explain_output_can_be_document_task_message_file_or_nothing: true
    do_not_auto_create_output: true
    do_not_mark_terminal_path_ready_while_policy_pending: true
  on_answer:
    select_outputs_from_catalog:
      label: selected existing output artifacts from catalog
      update_state:
        terminal_output_policy: use_existing_output
        selected_terminal_outputs: $answer.outputs
      next: N_SELECTED_OUTPUT_TEMPLATE_STATUS_CHECK
    add_new_output_artifact:
      label: new artifact/output requested
      update_state:
        terminal_output_policy: create_new_output
        available_terminal_state_fields: $runtime.terminal_path_state_fields
      next: N_NEW_OUTPUT_ARTIFACT_INTENT_CAPTURE
    no_output_required:
      label: explicit no-output terminal point
      update_state:
        terminal_output_policy: no_output_required
        terminal_output_bindings: $append:no_output_required
        template_review_required: false
        mock_example_required: false
      next: N_TERMINAL_PATH_READY_CHECK
    defer_output_decision:
      label: output decision deferred
      update_state:
        terminal_output_policy: deferred
        terminal_output_bindings: $append:deferred_output_decision
      next: N_TERMINAL_PATH_READY_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_terminal_output_policy_options
    max_attempts: 2
    on_exhausted:
      action: defer_output_decision
      reason: terminal output selection unclear
  description: 'Shared step 2: terminal output policy selection. This is a branching point; each branch is reviewed explicitly
    and downstream template logic is shared.'
- id: N_SELECTED_OUTPUT_TEMPLATE_STATUS_CHECK
  question: 'Check template status for each active output artifact: existing, missing/new recipe needed, partial, accepted
    for alpha, or unfinished/deferred.'
  answer_type: structured_list
  user_facing_contract:
    do_not_show_large_templates_inline: true
    document_like_artifacts_default_to_file_review_package: true
    template_status_is_not_approval: true
  on_answer:
    update_state:
      template_verification_status: $answer.status
      approved_output_templates: $answer.approved_templates
      deferred_output_templates: $answer.deferred_templates
      unfinished_output_templates: $answer.unfinished_templates
      template_required_state_fields: $answer.required_state_fields
    next: N_OUTPUT_TEMPLATE_REVIEW_OR_CREATION_DECISION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_template_exists_missing_partial_alpha_or_unfinished
    max_attempts: 2
    on_exhausted:
      action: continue_to_template_creation_loop
      reason: unknown template status is treated as missing
  description: 'Shared step 3: status check before review package generation. It does not approve templates; it only routes
    to review, creation, partial completion, alpha acceptance, or unfinished/deferred handling.'
- id: N_OUTPUT_TEMPLATE_REVIEW_OR_CREATION_DECISION
  question: 'Route template handling for selected outputs: use existing, create new recipe/template, complete partial, accept
    for alpha with risks, defer as unfinished, or remove output.'
  answer_type: enum
  allowed_answers:
  - use_existing_template
  - create_new_template_or_recipe
  - improve_partial_template
  - accept_template_for_alpha
  - defer_template_decision
  - remove_output_from_terminal_point
  answer_options:
    use_existing_template: Використати наявний template через review package
    create_new_template_or_recipe: Створити новий template/recipe
    improve_partial_template: Доробити partial template
    accept_template_for_alpha: Прийняти template для alpha з ризиками
    defer_template_decision: Відкласти template як unfinished
    remove_output_from_terminal_point: Прибрати output з цієї terminal point
  on_answer:
    use_existing_template:
      label: existing template review package
      next: N_OUTPUT_REVIEW_PACKAGE_GENERATION
    create_new_template_or_recipe:
      label: new template/recipe creation
      next: N_OUTPUT_TEMPLATE_CREATION_LOOP
    improve_partial_template:
      label: partial template completion
      update_state:
        partial_template_review_status: needs_completion
      next: N_OUTPUT_TEMPLATE_CREATION_LOOP
    accept_template_for_alpha:
      label: alpha template accepted with known limitations
      update_state:
        approved_output_templates: $append:$answer.template
        alpha_template_limitations: $append:$answer.known_limitations
      next: N_OUTPUT_REVIEW_PACKAGE_GENERATION
    defer_template_decision:
      label: template unfinished/deferred
      update_state:
        unfinished_output_templates: $append:$answer.template
        deferred_output_templates: $append:$answer.template
      next: N_TERMINAL_PATH_READY_CHECK
    remove_output_from_terminal_point:
      label: output removed from terminal point
      update_state:
        removed_output_artifacts: $append:$answer.removed_outputs
      next: N_TERMINAL_PATH_READY_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_template_route_existing_create_partial_alpha_defer_remove
    max_attempts: 2
    on_exhausted:
      action: defer_template_decision
      reason: template action unclear
  description: Routes output artifacts to file-first review package, recipe authoring, partial completion, alpha risk acceptance,
    unfinished/deferred handling, or removal.
- id: N_OUTPUT_TEMPLATE_REVIEW_LOOP
  question: 'After the user reviews the template/mock/mapping package, choose one simple action: confirm, revise, defer, or
    remove artifact.'
  answer_type: enum
  allowed_answers:
  - confirm
  - revise
  - defer
  - remove_artifact
  answer_options:
    confirm: Підтвердити
    revise: Доробити
    defer: Відкласти
    remove_artifact: Видалити artifact з terminal point
  user_facing_contract:
    keep_user_decisions_simple:
    - confirm
    - revise
    - defer
    - remove
    revise_may_include:
    - uploaded_modified_template
    - mapping_change
    - mock_regeneration
    - style_change
    - section_change
    - assumption_fix
    do_not_auto_approve_after_revision: true
  on_answer:
    confirm:
      label: review package confirmed
      update_state:
        approved_output_templates: $append:$answer.template
        artifact_review_decisions: $append:confirm
        mock_example_status: reviewed
        mapping_status: approved
      next: N_TERMINAL_OUTPUT_BINDING_CONFIRMATION
    revise:
      label: artifact/template needs revision
      update_state:
        artifact_review_decisions: $append:revise
        corrected_output_templates: $append:$answer.revision
      next: N_OUTPUT_REVIEW_PACKAGE_GENERATION
    defer:
      label: artifact/template unfinished
      update_state:
        artifact_review_decisions: $append:defer
        unfinished_output_templates: $append:$answer.template
        unfinished_artifacts: $append:$answer.artifact
      next: N_TERMINAL_PATH_READY_CHECK
    remove_artifact:
      label: artifact removed from terminal point
      update_state:
        artifact_review_decisions: $append:remove_artifact
        removed_output_artifacts: $append:$answer.artifact
      next: N_TERMINAL_PATH_READY_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_revise_defer_or_remove_artifact
    max_attempts: 2
    on_exhausted:
      action: defer
      reason: review decision unclear
  description: 'Shared step 5: user review result handling. The runtime intentionally avoids seven-option micro-menus; technical
    sub-actions are inferred under revise.'
- id: N_OUTPUT_TEMPLATE_CREATION_LOOP
  question: Create or complete an output recipe/template. The user may use guided, free-form, uploaded-template, or AI-proposed
    mode; no template-engine syntax knowledge is required.
  answer_type: structured_list
  user_facing_contract:
    show_available_terminal_state_fields: true
    support_authoring_modes:
    - guided
    - free_form
    - uploaded_template
    - ai_proposed
    capture_direct_insert_vs_generated_sections: true
    do_not_require_template_engine_syntax_from_user: true
  on_answer:
    update_state:
      output_recipe_catalog: $append:$answer.output_recipe
      output_template_catalog: $append:$answer.template
      direct_insert_fields: $append:$answer.direct_insert_fields
      generated_sections: $append:$answer.generated_sections
      generation_instructions: $append:$answer.generation_instructions
      template_required_state_fields: $append:$answer.required_state_fields
    next: N_OUTPUT_REVIEW_PACKAGE_GENERATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_recipe_sections_fields_direct_vs_generated_or_upload_template
    max_attempts: 2
    on_exhausted:
      action: defer_output_template
      reason: template creation data incomplete
  description: Creates or completes the output recipe/template and maps terminal state fields to direct inserts or generated
    sections before review package generation.
- id: N_TERMINAL_PATH_READY_CHECK
  question: 'Show terminal path readiness: output policy, active artifacts, template/mock/mapping status, alpha limitations,
    removed artifacts, unfinished blockers. Confirm ready only if there are no unfinished active artifacts/templates.'
  answer_type: enum
  allowed_answers:
  - terminal_path_ready
  - resolve_blockers
  - remove_blocker_artifact
  answer_options:
    terminal_path_ready: Підтвердити terminal path ready
    resolve_blockers: Доробити blocker
    remove_blocker_artifact: Видалити blocker artifact
  user_facing_contract:
    show_readiness_card: true
    if_blocked_show_only_resolve_or_remove: true
    do_not_require_template_when_no_output_required: true
    do_not_use_unfinished_active_artifacts: true
  on_answer:
    terminal_path_ready:
      label: terminal path ready
      update_state:
        terminal_path_ready: true
        terminal_path_ready_records: $append:$answer.ready_record
      next: N_SUBTREE_REVIEW_COMPLETION_CHECK
    resolve_blockers:
      label: terminal path blockers need revision
      update_state:
        open_correction_items: $append:$answer.blockers
      next: N_OUTPUT_TEMPLATE_REVIEW_OR_CREATION_DECISION
    remove_blocker_artifact:
      label: blocker artifact removed
      update_state:
        removed_output_artifacts: $append:$answer.artifact
      next: N_TERMINAL_PATH_READY_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: show_readiness_card_and_ask_ready_resolve_or_remove
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: terminal path readiness unclear
  description: 'Shared step 7: terminal path ready check. Unfinished active templates/artifacts block output generation until
    completed or removed.'
- id: N_SUBTREE_REVIEW_COMPLETION_CHECK
  question: 'Показати subtree review status: confirmed nodes/branches, unreviewed siblings, deferred return points, terminal
    output binding, corrections, blocking open questions. Що робимо далі?'
  answer_type: enum
  allowed_answers:
  - continue_sibling_review
  - return_to_deferred_point
  - fix_correction_items
  - complete_subtree_review
  - complete_with_accepted_deferred_items
  answer_options:
    continue_sibling_review: Продовжити review наступної sibling-гілки
    return_to_deferred_point: Повернутися до deferred return point
    fix_correction_items: Виправити відкриті correction items
    complete_subtree_review: Завершити subtree review
    complete_with_accepted_deferred_items: Завершити з accepted deferred items
  on_answer:
    continue_sibling_review:
      label: next sibling branch
      update_state:
        subtree_review_completion_status: continue
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    return_to_deferred_point:
      label: return to deferred
      update_state:
        subtree_review_completion_status: return_deferred
      next: N_TREE_DEPTH_FIRST_REVIEW_LOOP
    fix_correction_items:
      label: fix corrections
      update_state:
        subtree_review_completion_status: needs_correction
      next: N_DRAFT_SUBTREE_GENERATION
    complete_subtree_review:
      label: subtree complete
      update_state:
        subtree_review_completion_status: complete
        tree_review_depth_first_complete: true
      next: N_APPROVED_TREE_CONSOLIDATION
    complete_with_accepted_deferred_items:
      label: subtree complete with deferred alpha items
      update_state:
        subtree_review_completion_status: complete_with_deferred_alpha
        approved_for_alpha_with_deferred_items: true
      next: N_APPROVED_TREE_CONSOLIDATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_continue_deferred_fix_complete_or_complete_with_alpha_deferred
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: subtree completion status unclear
  description: Prevents accidental tree closure while sibling branches, deferred return points, correction items or terminal
    output bindings remain unresolved.
- id: N_APPROVED_TREE_CONSOLIDATION
  question: 'Зберіть approved tree summary: root, branches, terminal paths, output bindings, templates, deferred alpha items,
    risks, implied state fields, gates і outputs/templates.'
  answer_type: structured_list
  on_answer:
    update_state:
      approved_decision_tree: $answer.approved_tree
      terminal_output_bindings: $answer.terminal_output_bindings
      accepted_deferred_for_alpha: $answer.accepted_deferred_for_alpha
      tree_consolidation_status: $answer.status
    next: N_STATE_SCHEMA_BLUEPRINT
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_for_approved_tree_summary_or_alpha_deferred_record
    max_attempts: 2
    on_exhausted:
      action: escalate_to_human
      reason: approved tree consolidation missing
  description: Consolidates reviewed draft subtree into approved_decision_tree or approved_for_alpha_with_deferred_items before
    state/gate/source YAML generation. Free-dialogue trees may enter here only after candidate outputs are either bound, marked
    no-output, deferred/accepted for alpha, or removed.
- id: N_NEW_OUTPUT_ARTIFACT_INTENT_CAPTURE
  question: Describe freely what artifact should be created at this terminal point and why. The runtime shows available terminal
    state fields first; examples are hints only, not a closed list.
  answer_type: free_text_or_structured_list
  user_facing_contract:
    show_available_terminal_state_fields_first: true
    artifact_examples_are_non_limiting_hints:
    - Jira task
    - GitHub issue
    - document
    - checklist
    - JSON/YAML payload
    - message
    - handoff summary
    - custom artifact
    do_not_force_user_to_choose_from_fixed_type_list: true
    infer_artifact_kind_but_confirm_with_user: true
  on_answer:
    update_state:
      free_form_artifact_intent: $answer
      inferred_artifact_kind: $ai.inferred_artifact_kind
      candidate_output_artifact_catalog: $append:$ai.inferred_artifact_record
      artifact_intent_confirmation_status: pending_user_confirmation
    next: N_NEW_OUTPUT_ARTIFACT_INTENT_CONFIRMATION
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_user_to_describe_artifact_in_own_words_after_showing_available_state
    max_attempts: 2
    on_exhausted:
      action: defer_output_decision
      reason: new artifact intent unclear
  description: Captures free-form artifact intent for a new terminal output. The runtime must show accumulated terminal path
    state so the user can decide what to insert directly and what the model should generate.
- id: N_NEW_OUTPUT_ARTIFACT_INTENT_CONFIRMATION
  question: 'Confirm the interpreted artifact intent: purpose, audience, expected sections, and initial direct-vs-generated
    fill logic.'
  answer_type: enum
  allowed_answers:
  - confirm_artifact_intent
  - revise_artifact_intent
  - remove_artifact
  - defer_artifact
  answer_options:
    confirm_artifact_intent: Підтвердити artifact intent
    revise_artifact_intent: Доробити опис artifact
    defer_artifact: Відкласти artifact
    remove_artifact: Видалити artifact з terminal point
  user_facing_contract:
    show_interpreted_artifact_summary: true
    show_initial_direct_vs_generated_logic: true
    keep_actions_simple:
    - confirm
    - revise
    - defer
    - remove
  on_answer:
    confirm_artifact_intent:
      label: artifact intent confirmed
      update_state:
        artifact_intent_confirmation_status: confirmed
      next: N_OUTPUT_TEMPLATE_CREATION_LOOP
    revise_artifact_intent:
      label: artifact intent needs revision
      update_state:
        artifact_intent_confirmation_status: needs_revision
      next: N_NEW_OUTPUT_ARTIFACT_INTENT_CAPTURE
    defer_artifact:
      label: artifact deferred
      update_state:
        unfinished_artifacts: $append:$answer.artifact
      next: N_TERMINAL_PATH_READY_CHECK
    remove_artifact:
      label: artifact removed
      update_state:
        removed_output_artifacts: $append:$answer.artifact
      next: N_TERMINAL_PATH_READY_CHECK
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: ask_confirm_revise_defer_or_remove_artifact_intent
    max_attempts: 2
    on_exhausted:
      action: defer_artifact
      reason: artifact intent confirmation unclear
  description: Confirms AI interpretation of a free-form artifact request before recipe/template authoring begins.
- id: N_OUTPUT_REVIEW_PACKAGE_GENERATION
  question: 'Generate a review package for the artifact/template: template file, mock-filled example, mapping report, and
    assumptions/risks summary. Use file-first mode for document-like artifacts.'
  answer_type: enum
  allowed_answers:
  - review_package_generated
  - review_package_generation_failed
  answer_options:
    review_package_generated: Review package generated
    review_package_generation_failed: Review package generation failed / needs correction
  user_facing_contract:
    document_like_artifacts_default_review_mode: file_review_package
    short_artifacts_may_use_inline_preview: true
    file_review_package_contents:
    - template_file
    - mock_filled_example_file
    - mapping_report
    - assumptions_risks_summary
    chat_shows_summary_not_full_large_documents: true
  on_answer:
    review_package_generated:
      label: review package ready
      update_state:
        review_packages: $append:$answer.review_package
        mock_filled_examples: $append:$answer.mock_example
        mapping_reports: $append:$answer.mapping_report
        assumptions_risks_summaries: $append:$answer.assumptions
      next: N_OUTPUT_TEMPLATE_REVIEW_LOOP
    review_package_generation_failed:
      label: review package needs correction
      update_state:
        open_correction_items: $append:$answer.correction
      next: N_OUTPUT_TEMPLATE_CREATION_LOOP
  on_unmatched_input:
    action: CLARIFY.REQUEST
    strategy: confirm_review_package_generated_or_fix_generation
    max_attempts: 2
    on_exhausted:
      action: defer_output_template
      reason: review package generation unclear
  description: 'Shared step 4: review package/mock example generation. Large documents are delivered as downloadable files;
    chat shows only a summary/mapping/risk card.'
gates:
- id: G_DECISION_TREE_BLUEPRINT_PRESENT
  method: mechanical
  trust_class: deterministic
  condition: state.decision_tree_blueprint is not empty
  on_fail: block
- id: G_TREE_REVIEW_DEPTH_FIRST_APPROVED
  method: mechanical
  trust_class: deterministic
  condition: state.tree_review_depth_first_complete is true
  on_fail: block
- id: G_BASIC_TEST_CASES_AFTER_TREE_APPROVAL
  method: mechanical
  trust_class: deterministic
  condition: state.basic_test_case_catalog is not empty
  on_fail: block
- id: G_FREE_DIALOGUE_NOTES_STRUCTURED
  method: mechanical
  trust_class: deterministic
  condition: state.free_dialogue_structured_notes is not empty
  on_fail: block
- id: G_FREE_DIALOGUE_DRAFT_TREE_READY
  method: mechanical
  trust_class: deterministic
  condition: state.free_dialogue_draft_tree_ready is true
  on_fail: block
- id: G_SELF_HOSTED_BRANCH_STABILIZED
  method: mechanical
  trust_class: deterministic
  condition: state.stabilized_tree_branch is not null and state.self_hosted_reuse_enabled is true
  on_fail: block
- id: G_FOCUSED_CONTEXT_SVG_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Blocks readiness until the factory confirms that focused/context SVG is the default visualization while working
    on a specific tree branch.
  condition: state.graph_rendering_policy_status is not null and state.current_graph_rendering_mode is not null
  on_fail: block
- id: G_GRAPH_ANNOTATION_OVERLAY_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.graph_annotation_overlay_policy is not null and state.graph_annotation_overlay_status is not null
  on_fail: warn
  description: Confirms how graph generator v1.1 annotation overlay is used as an optional review layer.
- id: G_NODE_REVIEW_DISPLAY_CONTRACT_CONFIRMED
  method: mechanical
  trust_class: deterministic
  condition: state.node_review_display_policy_status is not null
  on_fail: block
- id: G_NODE_REVIEW_TRACKS_SIBLING_BRANCHES
  method: mechanical
  trust_class: deterministic
  condition: state.confirmed_review_path is not empty and state.current_review_branch is not null and state.unreviewed_sibling_branches
    is not empty and state.deferred_return_points is not empty
  on_fail: block
- id: G_CURRENT_NODE_REVIEW_INCLUDES_ORDO_LAYER
  method: mechanical
  trust_class: deterministic
  condition: state.current_node_review_record is not null
  on_fail: block
- id: G_CURRENT_NODE_REVIEW_DECISION_EXPLICIT
  method: human
  trust_class: human_decision
  description: Blocks forward progress until the user chooses approve/correct/defer for the currently displayed node; generic
    confirmation is not enough when options exist.
  condition: state.current_node_review_decision in [approved, needs_correction, deferred] and state.node_review_control_gate_status
    is not null
  on_fail: block
- id: G_PROCESS_DESIGN_REVIEW_RENDERING_POLICY_CONFIRMED
  method: mechanical
  trust_class: deterministic
  description: Confirms APF has a durable user-facing rendering contract for process-design review, including mode labels/context-shift
    notices and current-node state/gates/artifacts sections.
  condition: state.process_design_review_rendering_policy.enabled is true and state.process_design_review_rendering_policy.required_sections_for_current_node_rendering
    is not empty
  on_fail: block
- id: G_CURRENT_NODE_RENDERING_HAS_CONTEXT_SHIFT_LABEL
  method: human
  trust_class: human_decision
  description: 'Blocks ambiguous user-facing process review prompts: every current-node display must indicate whether the
    user is choosing a tree branch, reviewing a node, or passing an execution/validation gate.'
  condition: state.runtime_context_shift_notice is not null or state.current_process_layer_label is not null
  on_fail: block
- id: G_ALL_STARTUP_BRANCHES_JOIN_SHARED_PATHS
  method: mechanical
  trust_class: deterministic
  condition: state.all_startup_branches_join_shared_paths is true
  on_fail: block
  description: All four startup modes must join the shared output/template subflow where terminal outputs are involved and
    the shared validation/handoff tail before handoff.
assertions:
- id: A_FREE_DIALOGUE_FORMS_DRAFT_ON_WHAT_NEXT_SIGNAL
  polarity: must
  condition: when_user_asks_what_next_model_proposes_first_draft_tree_for_review
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_TEST_CASES_AFTER_TREE_APPROVAL
  polarity: must
  condition: basic_test_cases_are_generated_after_decision_tree_is_approved
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_FREE_DIALOGUE_ACCUMULATES_NOTES_BEFORE_DRAFT
  polarity: must
  condition: free_dialogue_raw_notes_are_structured_before_draft_tree_summary
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_STABILIZED_BRANCH_REUSED_AS_AUTHORING_ALGORITHM
  polarity: must
  condition: stabilized_free_dialogue_branch_can_be_used_as_algorithm_for_next_branches
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_CONTEXT_SVG_BY_DEFAULT_DURING_BRANCH_WORK
  polarity: must
  condition: branch_authoring_uses_context_svg_unless_full_tree_review_is_explicitly_requested
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_GRAPH_ANNOTATION_OVERLAY_IS_REVIEW_AID
  polarity: must
  condition: graph_annotation_overlay_does_not_replace_source_yaml_or_validator_results
  phase:
  - runtime
  - test
  severity: warn
  on_fail: WARN
- id: A_NODE_REVIEW_INCLUDES_STATE_GATES_ARTIFACTS
  polarity: must
  condition: every_user_facing_current_node_review_includes_state_gates_and_artifacts_sections
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_SIBLING_BRANCHES_ARE_TRACKED_DURING_DEPTH_FIRST_REVIEW
  polarity: must
  condition: unreviewed_sibling_branches_and_deferred_return_points_are_not_lost_when_following_one_branch_depth_first
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
- id: A_CURRENT_NODE_RENDERING_MUST_SHOW_PROCESS_STATE
  polarity: must
  condition: current_node_rendering_includes_current_node_state_gates_artifacts_pending_branches_and_decision_prompt
  phase:
  - runtime
  - test
  severity: warn
  on_fail: WARN
- id: A_FREE_DIALOGUE_OUTPUT_CANDIDATES_NOT_DROPPED
  condition: free_dialogue_notes_mention_outputs_but_candidate_output_artifact_catalog_empty_without_no_output_policy
  severity: block
  on_fail: STOP
  description: Free-dialogue extraction must not drop output/document/template mentions; if outputs are absent, deferred,
    or unknown, that policy must be explicit.
  polarity: not
  phase:
  - runtime
  - test
- id: A_MANUAL_TREE_INPUT_NOT_APPROVED_DIRECTLY
  condition: manual_tree_input_requires_normalized_tree_draft_before_approved_decision_tree
  severity: block
  polarity: must
  phase:
  - runtime
  - test
  on_fail: STOP
  description: Branch 2 manual_tree_input must be normalized and reviewed; it cannot become approved_decision_tree directly.
- id: A_MANUAL_TREE_BRANCH_REUSES_BRANCH_1_SHARED_PATH
  condition: manual_tree_join_point_routes_to_shared_branch_1_downstream_path
  severity: block
  polarity: must
  phase:
  - runtime
  - test
  on_fail: STOP
  description: Branch 2 must remain an entry adapter and reuse branch 1 downstream review/output/template/validation mechanics.
- id: A_ALPHA20_STARTUP_BRANCHES_INTEGRATED
  polarity: must
  condition: branch_1_branch_2_branch_3_branch_4_have_valid_join_paths
  phase:
  - runtime
  - test
  severity: block
  on_fail: STOP
  description: All four startup branches are integrated into the current APF tree.
