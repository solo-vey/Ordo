gates:
- id: G_EPIC_01_COMPLETE
  method: mechanical
  trust_class: deterministic
  condition: state.charter_complete is true and state.vocabulary_complete is true and state.conceptual_model_complete is true
    and state.backlog_complete is true and state.self_validation_passed is true
  on_pass: N007_ACTIVATE_EPIC_02
  on_fail: T_DRAFT_SAVED
- id: G_EPIC_02_COMPLETE
  method: mechanical
  trust_class: deterministic
  condition: state.task_class_model_complete is true and state.test_case_intake_complete is true and state.test_case_package_template_complete
    is true and state.self_validation_passed is true
  on_pass: N012_ACTIVATE_EPIC_03
  on_fail: T_DRAFT_SAVED
- id: G_EPIC_03_COMPLETE
  method: mechanical
  trust_class: deterministic
  condition: state.canonical_run_scenarios_complete is true and state.scenario_extensibility_complete is true and state.self_validation_passed
    is true
  on_pass: N016_ACTIVATE_EPIC_04
  on_fail: T_DRAFT_SAVED
- id: G_EPIC_04_COMPLETE
  condition: package_variant_registry_complete and yaml_compiler_contract_complete and structured_compiler_contract_complete
    and historical_compiler_contract_complete and direct_adaptation_contract_complete and backlog_complete and self_validation_passed
  on_pass: N079_SELECT_REPRESENTATION_PROFILE
  on_fail: T_DRAFT_SAVED
- id: G_EPIC_05_COMPLETE
