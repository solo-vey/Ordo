ordo:
  version: 1.0.0-alpha.29
  package: ordo.benchmark_creation_playbook
  control_level: strict
  execution_mode: chat_internal
program_contract:
  id: PROGRAM_BENCHMARK_CREATION_PLAYBOOK
  lifecycle: alpha
  control_level: strict
  execution_mode: chat_internal
  compatibility:
    language: '>=0.13.0-rc.1'
    arf: '>=0.1.0-rc.1'
  validation_expectations:
  - focused_scope_before_action
  - one_node_one_contract_one_decision
  - backlog_status_and_evidence_sync
  - no_false_execution_ready_claim
  - cumulative_epic_extension_without_replacing_completed_nodes
  - single_canonical_entrypoint
  - all_route_authorized_nodes_reachable
  - no_dangling_transition_targets
  - no_accidental_dead_ends
  - connectivity_report_and_svg_same_revision
intent:
  id: INTENT_AUTHOR_BENCHMARK_PLAYBOOK
  description: Build a deterministic playbook for benchmark creation, execution, evaluation, comparison and improvement.
contract:
  id: CONTRACT_BL_BENCH_041_SCOPED_YAML_PATCH
  required:
  - affected_node_allowlist
  - structural_diff
  - semantic_diff
  - out_of_scope_rejection
  - unchanged_node_hash_proof
state:
  id: STATE_BENCHMARK_PLAYBOOK_AUTHORING
  schema:
    active_epic: NONE
    focused_scope_confirmed: true
    language_baseline_verified: true
    charter_complete: true
    vocabulary_complete: true
    conceptual_model_complete: true
    backlog_complete: true
    self_validation_passed: true
    epic_01_status: done
    full_playbook_status: complete
    task_class_model_complete: true
    test_case_intake_complete: true
    test_case_package_template_complete: true
    epic_02_status: done
    canonical_run_scenarios_complete: true
    scenario_extensibility_complete: true
    epic_03_status: done
    package_variant_registry_complete: true
    yaml_compiler_contract_complete: true
    structured_compiler_contract_complete: true
    historical_compiler_contract_complete: true
    direct_adaptation_contract_complete: true
    epic_04_status: done
    step_bound_driver_contract_complete: true
    adaptive_semantic_driver_contract_complete: true
    driver_selection_gate_complete: true
    blind_isolation_rules_complete: true
    epic_05_status: done
    universal_launch_protocol_complete: true
    preflight_integrity_gate_complete: true
    execution_logging_complete: true
    terminal_route_handling_complete: true
    epic_06_status: done
    process_quality_contract_complete: true
    process_failure_caps_complete: true
    epic_07_status: done
    document_contract_registry_complete: true
    artifact_specific_rules_complete: true
    document_failure_caps_complete: true
    focused_artifact_review_complete: true
    evaluation_report_template_complete: true
    causal_diagnostic_prompt_complete: true
    diagnostic_evidence_contract_complete: true
    root_cause_classification_complete: true
    epic_08_status: done
    epic_09_status: done
    epic_10_status: done
    improvement_patch_workflow_complete: true
    regression_scenario_selection_complete: true
    five_cycle_improvement_mode_complete: true
    stable_benchmark_evolution_complete: true
    epic_11_status: done
    scoped_yaml_patch_verifier_complete: true
    execution_graph_connectivity_complete: true
    execution_graph_connectivity_status: PASS
    bl_bench_046_status: done
interaction_model:
  primary_actor: AI_Ordo_Developer
  human_role: Benchmark_Owner
  deviation_policy: explain_and_return_to_active_node
  correction_policy: invalidate_affected_artifacts_and_revalidate
process_rail:
  rail_id: RAIL_BENCHMARK_PLAYBOOK_AUTHORING
  checkpoint_policy: earliest_incomplete_node_first
  forward_rule: all_required_fields_of_current_node_complete
  backlog_sync_required: true
  entrypoint: N001_FOCUSED_SCOPE
  completion_terminal: T_PLAYBOOK_COMPLETED
  connectivity_gate: G_EXECUTION_GRAPH_CONNECTIVITY
  graph_policy: all route-authorized nodes and gates must be reachable from entrypoint; only declared terminals may end a
    route
nodes:
- id: N001_FOCUSED_SCOPE
  profile: capture_node
  question: Confirm current authoring scope and exact epic.
  answer_type: structured
  required_fields:
  - active_epic
  - expected_outputs
  on_complete:
    update_state:
      focused_scope_confirmed: true
    next: N002_VERIFY_LANGUAGE_BASELINE
- id: N002_VERIFY_LANGUAGE_BASELINE
  profile: validator_node
  validation:
    sources:
    - language/CURRENT_VERSION.md
    - language/ARF_NODE_CONTRACT_PROFILES.md
    - language/RUNTIME_MODEL.md
    expected:
      language_version: 0.13.0-rc.1
      framework_version: 0.1.0-rc.1
  on_pass:
    update_state:
      language_baseline_verified: true
    next: N003_CREATE_CHARTER
  on_fail:
    next: T_BLOCKED_EVIDENCE
- id: N003_CREATE_CHARTER
