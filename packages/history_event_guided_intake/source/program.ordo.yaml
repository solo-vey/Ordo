    required: conditional
    visibility: expose_on_request
    state_change_allowed: false
    resume_supported: true
  entry_files:
  - path: README.md
    role: readme
    required: 'true'
    visibility: visible_to_analyst
  - path: START_HERE_RUNTIME_MODE.md
    role: start_here
    required: 'true'
    visibility: visible_to_analyst
  - path: START_PROMPT_RUNTIME_MODE.md
    role: runtime_start_prompt
    required: 'true'
    visibility: visible_to_analyst
  - path: prompts/hp.package.quick_start.v1.md
    role: hp.package.quick_start.v1
    required: 'true'
    visibility: visible_to_analyst
  - path: prompts/hp.runtime.start.v1.md
    role: runtime_start_prompt
    required: recommended
    visibility: visible_to_analyst
  - path: PROMPT_MANIFEST.json
    role: manifest
    required: recommended
    visibility: developer
  - path: PROMPT_REGISTRY_VALIDATION_PROFILE.md
