model_assisted_output_templates:
- id: QA_AUTOMATION_SPEC_MODEL_ASSISTED
  type: document
  format: yaml
  path: 08_QA_AUTOMATION_SPEC_{{ state.event_alias | safe_name }}.yaml
  template: templates/08_qa_automation_spec_model_assisted.yaml
  source: state
  allowed_after:
  - OUT_HISTORY_EVENT_PACKAGE
  render_mode: model_assisted
  renderer: ai.yaml
  requires_model_rendering: true
  validation: strict_confirmed_state_only
  tbd_policy: preserve_tbd_until_confirmed
  m45_deterministic_renderer_compatible: false
  explicit_tbd_defaults:
  - ⚠️ TBD
  forbidden_unconfirmed_terms:
  - InventedProviderClass
  forbidden_inference_rules:
  - Do not infer Java/provider class names that are not confirmed in state.
  - Do not remove ⚠️ TBD markers unless a confirmed state field supplies the value.
  - Do not mark candidate or proposed values as confirmed.
