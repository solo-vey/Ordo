output_templates:
- id: HISTORY_EVENT_PASSPORT
  type: document
  format: markdown
  path: 01_HISTORY_EVENT_PASSPORT_{{ state.event_alias | safe_name }}.md
  template: templates/01_history_event_passport.md
  source: state
  allowed_after:
  - OUT_HISTORY_EVENT_PACKAGE
  render_mode: deterministic
  renderer: ordo.simple
  requires_model_rendering: false
