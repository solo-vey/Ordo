# Process Rail Schema Convention v1
# Status: M64.2 documented schema convention, not enforced runtime schema.

type: object
name: process_rail_schema_v1
status: convention
properties:
  rail_id: {type: string}
  state_tracking:
    type: string
    enum:
      - required
      - recommended
      - none
  allow_deviation: {type: boolean}
  require_resume_after_deviation: {type: boolean}
  resume_policy:
    type: string
    enum_or_convention:
      - return_to_current_node_after_deviation
      - return_to_last_unresolved_question
      - ask_user_where_to_resume
      - resume_at_declared_checkpoint
  backtracking:
    type: string
    enum:
      - disabled
      - restricted
      - enabled
  backtracking_policy:
    type: object
    properties:
      invalidates_dependent_state: {type: boolean}
      requires_review_before_continue: {type: boolean}
      preserve_artifacts_until_reconfirmed: {type: boolean}
  skip_ahead_policy:
    type: string
    enum_or_convention:
      - block_until_required_state_ready
      - capture_as_future_context
      - ask_clarification
  stale_answer_policy:
    type: string
    enum_or_convention:
      - require_reconfirmation
      - invalidate_and_reask
      - keep_with_warning
validation_notes:
  m64_2: Documentation/schema convention only.
  future_m64_3: May define warnings/errors for missing resume or backtracking policies.
