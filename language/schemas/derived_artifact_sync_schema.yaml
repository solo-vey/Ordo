$schema: "https://json-schema.org/draft/2020-12/schema"
title: Ordo Derived Artifact Sync Schema
status: M67.0 convention schema
x-ordo-scope: documentation-package-consistency
type: object
additionalProperties: false
required: [artifact_sync]
properties:
  artifact_sync:
    type: object
    additionalProperties: true
    required: [sync_id, profile, source_of_truth, derived_artifacts]
    properties:
      sync_id: {type: string, minLength: 1}
      profile: {type: string, enum: [light, standard, strict]}
      source_of_truth:
        type: array
        minItems: 1
        items:
          type: object
          required: [path, role]
          additionalProperties: true
          properties:
            path: {type: string, minLength: 1}
            role: {type: string, minLength: 1}
      derived_artifacts:
        type: array
        items:
          type: object
          required: [artifact_id, path, derived_from, derivation_method, freshness_policy, stale_action]
          additionalProperties: true
          properties:
            artifact_id: {type: string, minLength: 1}
            path: {type: string, minLength: 1}
            derived_from:
              type: array
              minItems: 1
              items: {type: string, minLength: 1}
            derivation_method: {type: string, minLength: 1}
            freshness_policy: {type: string, enum: [must_exist, must_match_hash, manual_or_tool_verified, regenerate_required, not_applicable]}
            stale_action: {type: string, enum: [block_release, open_delta_backlog, warn_only, ignore_for_draft]}
            delta_backlog_ref: {type: string}
