$schema: "https://json-schema.org/draft/2020-12/schema"
$title: Ordo CI Release Clean Gate Policy
$type: object
$defs:
  gate:
    type: object
    required: [gate_id, gate_class, profile, fail_on_warning, report_path]
    properties:
      gate_id: {type: string, minLength: 1}
      gate_class:
        type: string
        enum: [pull_request, main_branch, release_candidate, release, manual_audit]
      profile:
        type: string
        enum: [light, standard, strict]
      fail_on_warning: {type: boolean}
      report_path: {type: string, minLength: 1}
      retain_evidence: {type: boolean, default: true}
      require_repo_policy: {type: boolean, default: true}
    additionalProperties: false
required: [ci_release_clean_gates]
properties:
  ci_release_clean_gates:
    type: object
    required: [policy_id, gates]
    properties:
      policy_id: {type: string, minLength: 1}
      report_schema: {type: string, default: "ordo.repo_hygiene.report.v1"}
      gates:
        type: array
        minItems: 1
        items: {$ref: "#/$defs/gate"}
    additionalProperties: false
additionalProperties: false
