schema_version: ordo.blind_automation_profile.v1
profile_id: sample.semantic_adaptive
execution_profile: semantic_adaptive
self_scoring: false
driver_protocol: [start, ask, answer, present, correction, finish]
disclosure_policy:
  mode: minimal_relevant
  over_disclosure_guard: true
terminal_state_contract: [T_COMPLETED, T_INPUT_BLOCKED, T_SCENARIO_EXHAUSTED, NO_GO, not_ready]
fact_statuses: [confirmed, tentative, withdrawn, superseded, unavailable, irrelevant]
artifact_versioning:
  immutable_versions: true
  approval_scope: artifact_version
correction_invalidation:
  invalidate_dependents: true
  invalidate_approvals: true
  consistency_review: true
evaluation_contract:
  independent: true
  separate_process_and_document_scores: true
  default_weighting: {process: 0.5, document_quality: 0.5}
diagnostic_causal_review:
  self_scoring_prohibited: true
  corroboration_required: true
  allowed_claim_statuses: [model_reported, trace_corroborated, file_corroborated, reproduced, rejected]
intent_catalog:
  - {intent_id: source.collection, allowed_facts: [document_id, record_key]}
  - {intent_id: change.definition, allowed_facts: [field_path, old_value, new_value, operation]}
  - {intent_id: approval.status, allowed_facts: [passport, jira, manual_qa, automation]}
compound_intent_policy: disclose_union_of_independently_matched_intents
ambiguity_policy: ask_for_clarification_without_disclosing_hidden_facts
