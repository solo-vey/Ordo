    evidence:
    - reports/CSG_FULL_REGRESSION_REPORT.json
  schema_support:
    status: integrated
    evidence:
    - language/schemas/deviation_classification.schema.json
    - language/schemas/scope_guard_policy.schema.json
    - language/schemas/state_protection.schema.json
    - language/schemas/csg_package_binding.schema.json
    - language/schemas/conversation_scope_guard_source.schema.json
    - language/schemas/semantic_json_ir_schema.yaml
  toolchain_support:
    status: integrated
    evidence:
    - cli/ordo/linter.py
    - cli/ordo/compiler.py
    - cli/ordo/registry_checks.py
    - cli/tests/test_m74_1_registry_completeness.py
  runtime_enforcement:
    status: integrated_helper_runner
    acceptance_gate: G_CSG_RUNTIME_ENFORCEMENT_READY
    evidence:
    - cli/ordo/csg_runtime.py
    - cli/ordo/runner.py
    - cli/tests/test_m75_1_csg_runtime_enforcement.py
    capabilities:
    - protected state mutation blocking
    - pause/resume/exit enforcement
    - safety bypass state protection
