    acceptance_gate: G_CSG_PRODUCTION_READY
    evidence:
    - M75_4_CSG_PRODUCTION_THRESHOLDS_FALLBACK_ROLLBACK.md
    - M75_4_VALIDATION_REPORT.json
core_default:
  supported: false
  enabled: false
source_construct:
  op: CONVERSATION.SCOPE.DEF
  required_fields:
  - id
  - enabled
  - mode
  - scope
  - out_of_scope_behavior
  - escalation
  - trace
modes:
- advisory
- guided_redirect
- strict_redirect
- locked_process
deviation_types:
- answer_to_active_question
- clarification
- correction
- backtrack_request
- requirement_change
- pause_request
- resume_request
- exit_request
- process_meta_question
- related_context
- unrelated_topic
- unsafe_or_emergency_message
- unclassifiable_input
state_protection_invariants:
- A_DEVIATION_DOES_NOT_COMPLETE_NODE
- A_DEVIATION_DOES_NOT_CHANGE_PATH
- A_DEVIATION_DOES_NOT_CONFIRM_STATE
- A_DEVIATION_DOES_NOT_RESET_STATE
- A_UNCLASSIFIABLE_INPUT_IS_NOT_ACCEPTED_AS_ANSWER
- A_SCOPE_GUARD_DOES_NOT_BLOCK_CONTROL_INTENT
- A_SCOPE_GUARD_DOES_NOT_BLOCK_SAFETY
operations:
- DEVIATION.CLASSIFY
- DEVIATION.HANDLE
- DEVIATION.ESCALATE
- STATE.PROTECT
- PROCESS.PAUSE
- PROCESS.RESUME
- PROCESS.EXIT
trace_events:
- conversation.deviation.detected
- conversation.deviation.classified
- conversation.redirect.emitted
- conversation.escalation.changed
- conversation.scope_guard.bypassed_for_control_intent
- conversation.scope_guard.bypassed_for_safety
- process.pause.requested
- process.paused
- process.resume.requested
- process.resumed
- process.exit.requested
- process.exited
apf:
  self_enabled: false
  generated_guided_playbook_recommendation:
    supported: true
    enabled: true
    mode: guided_redirect
    state_change_on_out_of_scope: false
